# Task definitions for the MongoDB runbook image.
#
# Pulled in via `include:` from `task-mongodb.yaml`, which owns the global
# `defaults:` (timeout / max_retry / queue). An included file MUST NOT define
# its own `defaults:` — aqsh rejects the whole config if it does.
tasks:
  common/hello:
    script: common/hello.sh
    timeout: 1m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: name
        env: NAME
        required: true
        type: string
  restart:
    script: mongodb/restart.sh
    description: "Rolling restart of a MongoDB StatefulSet"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^mongo-[0-9]+$'
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: mongodb
  sanity-check:
    script: mongodb/sanity-check.sh
    description: "3-layer health check: K8s infrastructure, MongoDB connectivity, MongoDB internals"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^mongo-[0-9]+$'
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: mongodb
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: mongodb-credentials
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: MONGO_ROOT_USER
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: MONGO_ROOT_PASS
  backup:
    script: backup/backup-mongodb.sh
    description: "Backup MongoDB database to MinIO"
    timeout: 15m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^mongo-[0-9]+$'
      - name: minio_bucket
        env: MINIO_BUCKET
        required: false
        type: string
        default: db-backups
