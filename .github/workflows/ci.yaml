name: CI

'on':
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_DB_RUNBOOKS: ghcr.io/${{ github.repository }}

jobs:
  lint:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install prerequisites
        run: ./scripts/preflight.sh

      - name: Run ShellCheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi
          find . -type f -name '*.sh' -print0 \
            | xargs -0 --no-run-if-empty shellcheck --severity=warning -x

      - name: Run Bats unit tests
        run: |
          if [ -d tests/unit ]; then
            bats --recursive tests/unit
          fi

      - name: Run Hadolint
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL4006

  build-image:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build db-runbooks task image
        run: docker build -t "${IMAGE_DB_RUNBOOKS}:ci" .

  integration:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - db_mode: single
            use_mariadb_operator: "true"
          - db_mode: single
            use_mariadb_operator: "false"
          - db_mode: dual
            use_mariadb_operator: "true"
          - db_mode: dual
            use_mariadb_operator: "false"
    env:
      DB_MODE: ${{ matrix.db_mode }}
      USE_MARIADB_OPERATOR: ${{ matrix.use_mariadb_operator }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Tune kernel limits for Kind
        run: |
          sudo sysctl fs.inotify.max_user_watches=524288
          sudo sysctl fs.inotify.max_user_instances=512

      - name: Run BATS tests (DB_MODE=${{ matrix.db_mode }}, USE_MARIADB_OPERATOR=${{ matrix.use_mariadb_operator }})
        run: ./scripts/test.sh

      - name: Tear down clusters
        if: always()
        run: ./scripts/teardown.sh

  publish-image:
    needs: [lint, build-image, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Generate image tag
        id: image-tag
        run: |
          short_sha="${GITHUB_SHA::7}"
          image_tag="$(date -u +%Y%m%d)-${short_sha}"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push db-runbooks task image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_DB_RUNBOOKS }}:${{ steps.image-tag.outputs.image_tag }}

  infra:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Tune kernel limits for Kind
        run: |
          sudo sysctl fs.inotify.max_user_watches=524288
          sudo sysctl fs.inotify.max_user_instances=512

      - name: Install prerequisites
        run: ./scripts/preflight.sh

      - name: Run infra e2e tests
        run: bats tests/infra/

      - name: Tear down infra clusters
        if: always()
        run: |
          kind delete cluster --name cluster-a 2>/dev/null || true
          kind delete cluster --name cluster-b 2>/dev/null || true
          docker rm -f registry 2>/dev/null || true

  aqsh:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Tune kernel limits for Kind
        run: |
          sudo sysctl fs.inotify.max_user_watches=524288
          sudo sysctl fs.inotify.max_user_instances=512

      - name: Install prerequisites
        run: ./scripts/preflight.sh

      - name: Run aqsh test suite
        run: bats tests/aqsh/

      - name: Tear down clusters
        if: always()
        run: |
          kind delete cluster --name cluster-a 2>/dev/null || true
          kind delete cluster --name cluster-b 2>/dev/null || true
          docker rm -f registry 2>/dev/null || true

  mongodb:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Tune kernel limits for Kind
        run: |
          sudo sysctl fs.inotify.max_user_watches=524288
          sudo sysctl fs.inotify.max_user_instances=512

      - name: Install prerequisites
        run: ./scripts/preflight.sh

      - name: Run mongodb test suite
        run: bats tests/mongodb-suite/

      - name: Tear down clusters
        if: always()
        run: |
          kind delete cluster --name cluster-a 2>/dev/null || true
          kind delete cluster --name cluster-b 2>/dev/null || true
          docker rm -f registry 2>/dev/null || true
