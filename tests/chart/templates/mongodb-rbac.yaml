{{- if .Values.mongodbRbac.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aqsh-mongo-manager
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    resourceNames: [{{ .Values.mongodb.stsName | default "mongodb" | quote }}]
    # delete is for sts/orphan-delete (--cascade=orphan): removes the STS
    # controller object only, Pods/PVCs are untouched (see
    # docs/mongodb/sts-orphan-delete.md).
    verbs: ["get", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ .Values.mongodb.credentialSecret | default "mongodb-credentials" | quote }}
      # S3 credentials for the PBM gateway (pbm/* tasks render them into
      # `pbm config` payloads) — same name PBM_S3_CREDENTIALS_SECRET_DEFAULT
      # resolves; change them together (see values.yaml).
      - {{ .Values.mongodb.backupSecret | default "minio" | quote }}
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames:
      - {{ .Values.mongodb.recoveryConfigmap | default "mongodb-recovery-config" | quote }}
      - {{ .Values.mongodb.reconfigAuditConfigmap | default "mongodb-reconfig-audit" | quote }}
    verbs: ["get", "patch"]
  # create cannot be scoped by resourceNames (Kubernetes RBAC ignores
  # resourceNames for create requests — there's no object yet to match
  # against), so this is intentionally namespace-wide for configmaps, not
  # pinned to recoveryConfigmap. G1 self-heal uses it to create the recovery
  # ConfigMap when it's missing entirely, not just the init container.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get"]
  # pbm/schedule's managed CronJob (docs/mongodb/pbm.md#scheduling) — same
  # name PBM_SCHEDULE_CRONJOB_DEFAULT resolves; change them together.
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    resourceNames: [{{ .Values.mongodb.scheduleCronjob | default "pbm-backup-schedule" | quote }}]
    verbs: ["get", "patch", "delete"]
  # create cannot be scoped by resourceNames (same reason as configmaps
  # above) — namespace-wide by necessity, used only for the first
  # pbm/schedule apply.
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aqsh-mongo-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aqsh-mongo-node-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aqsh-mongo-node-reader
subjects:
  - kind: ServiceAccount
    name: kube-auth-proxy
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aqsh-mongo-manager
  namespace: {{ .Values.mongodb.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aqsh-mongo-manager
subjects:
  - kind: ServiceAccount
    name: kube-auth-proxy
    namespace: {{ .Release.Namespace }}
{{- end }}
