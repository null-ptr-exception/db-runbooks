name: Release Task Images

'on':
  push:
    tags: ["*"]

permissions:
  contents: read

env:
  IMAGE_MARIADB: ghcr.io/${{ github.repository }}/aqsh-mariadb
  IMAGE_MONGODB: ghcr.io/${{ github.repository }}/aqsh-mongodb

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck python3-pip bats jq
          python3 -m pip install yamllint

      - name: Run ShellCheck
        run: |
          find . -type f -name '*.sh' -print0 \
            | xargs -0 --no-run-if-empty shellcheck --severity=warning -x

      - name: Run Bats unit tests
        run: |
          if [ -d tests/unit ]; then
            ./scripts/install-bats-libs.sh
            bats --recursive tests/unit
          fi

      - name: Run yamllint
        run: |
          find k8s -type f \( -name '*.yaml' -o -name '*.yml' -o -name '*.yaml.tpl' -o -name '*.yml.tpl' \) -print0 \
            | xargs -0 --no-run-if-empty yamllint -c .yamllint.yaml

  integration:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - db_mode: single
            use_mariadb_operator: "true"
          - db_mode: single
            use_mariadb_operator: "false"
          - db_mode: dual
            use_mariadb_operator: "true"
          - db_mode: dual
            use_mariadb_operator: "false"
    env:
      DB_MODE: ${{ matrix.db_mode }}
      USE_MARIADB_OPERATOR: ${{ matrix.use_mariadb_operator }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Tune kernel limits for Kind
        run: |
          sudo sysctl fs.inotify.max_user_watches=524288
          sudo sysctl fs.inotify.max_user_instances=512

      - name: Activate mise
        run: mise trust && mise install

      - name: Run BATS tests (DB_MODE=${{ matrix.db_mode }}, USE_MARIADB_OPERATOR=${{ matrix.use_mariadb_operator }})
        run: ./scripts/test.sh

      - name: Tear down clusters
        if: always()
        run: ./scripts/teardown.sh

  publish:
    needs: [validate, integration]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata for aqsh-mariadb
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta-mariadb
        with:
          images: ${{ env.IMAGE_MARIADB }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build and push aqsh-mariadb
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        id: push-mariadb
        with:
          context: ./aqsh-tasks
          push: true
          build-args: TASKS_YAML=tasks-mariadb.yaml
          tags: ${{ steps.meta-mariadb.outputs.tags }}
          labels: ${{ steps.meta-mariadb.outputs.labels }}

      - name: Metadata for aqsh-mongodb
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: meta-mongodb
        with:
          images: ${{ env.IMAGE_MONGODB }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build and push aqsh-mongodb
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        id: push-mongodb
        with:
          context: ./aqsh-tasks
          push: true
          build-args: TASKS_YAML=tasks-mongodb.yaml
          tags: ${{ steps.meta-mongodb.outputs.tags }}
          labels: ${{ steps.meta-mongodb.outputs.labels }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MARIADB_IMAGE_REF: ${{ env.IMAGE_MARIADB }}:${{ github.ref_name }}
          MARIADB_DIGEST: ${{ steps.push-mariadb.outputs.digest }}
          MONGODB_IMAGE_REF: ${{ env.IMAGE_MONGODB }}:${{ github.ref_name }}
          MONGODB_DIGEST: ${{ steps.push-mongodb.outputs.digest }}
        run: |
          NOTES=$(cat <<'EOF'
          ## Container Images

          ```bash
          docker pull __MARIADB_IMAGE_REF__
          docker pull __MONGODB_IMAGE_REF__
          ```

          Digests:

          - `__MARIADB_IMAGE_REF__@__MARIADB_DIGEST__`
          - `__MONGODB_IMAGE_REF__@__MONGODB_DIGEST__`
          EOF
          )
          NOTES="${NOTES//__MARIADB_IMAGE_REF__/${MARIADB_IMAGE_REF}}"
          NOTES="${NOTES//__MONGODB_IMAGE_REF__/${MONGODB_IMAGE_REF}}"
          NOTES="${NOTES//__MARIADB_DIGEST__/${MARIADB_DIGEST}}"
          NOTES="${NOTES//__MONGODB_DIGEST__/${MONGODB_DIGEST}}"
          gh release create "${GITHUB_REF_NAME}" --generate-notes --notes "$NOTES"
