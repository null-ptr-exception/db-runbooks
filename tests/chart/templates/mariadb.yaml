{{- if .Values.mariadb.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: mariadb
  namespace: {{ .Values.mariadb.namespace }}
stringData:
  password: {{ .Values.mariadb.rootPassword | quote }}
---
# S3 credentials the mariadb-operator uses for PhysicalBackup / bootstrapFrom
# (physical-backup + restore tasks reference secret "minio", keys access-key-id /
# secret-access-key). It must live in the MariaDB instance's own namespace, and
# its values must match the deployed MinIO (chart-default minio creds).
apiVersion: v1
kind: Secret
metadata:
  name: minio
  namespace: {{ .Values.mariadb.namespace }}
stringData:
  access-key-id: {{ .Values.minio.rootUser | quote }}
  secret-access-key: {{ .Values.minio.rootPassword | quote }}
---
apiVersion: {{ .Values.mariadb.operatorGroup }}/v1alpha1
kind: MariaDB
metadata:
  name: mariadb
  namespace: {{ .Values.mariadb.namespace }}
spec:
{{- if .Values.mariadb.objectStorage.enabled }}
  envFrom:
    - secretRef:
        name: {{ .Values.mariadb.objectStorage.secretName }}
{{- end }}
  rootPasswordSecretKeyRef:
    name: mariadb
    key: password
  port: 3306
  image: {{ .Values.mariadb.image }}
{{- if gt (int .Values.mariadb.replicas) 1 }}
  replicas: {{ .Values.mariadb.replicas }}
  replication:
    enabled: true
    primary:
      podIndex: 0
    replica:
      replPasswordSecretKeyRef:
        name: mariadb
        key: password
  # Keep the operator-native role Services explicit: the namespace-local
  # database gateway routes writes to the primary and reads to secondaries.
  primaryService:
    type: ClusterIP
  secondaryService:
    type: ClusterIP
{{- end }}
{{- if eq .Values.mariadb.operatorGroup "k8s.mariadb.com" }}
  storage:
    size: {{ .Values.mariadb.storage }}
{{- else }}
  # The mmontes-era v0.0.24 CRD requires volumeClaimTemplate; spec.storage was
  # introduced by the current k8s.mariadb.com generation.
  volumeClaimTemplate:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: {{ .Values.mariadb.storage }}
{{- end }}
  resources:
    requests:
      cpu: {{ .Values.mariadb.resources.requests.cpu | quote }}
      memory: {{ .Values.mariadb.resources.requests.memory | quote }}
    limits:
      memory: {{ .Values.mariadb.resources.limits.memory | quote }}
{{- if eq .Values.mariadb.operatorGroup "k8s.mariadb.com" }}
  startupProbe:
    exec:
      command:
        - bash
        - -c
        - mariadb -u root -p"${MARIADB_ROOT_PASSWORD}" -e "SELECT 1;"
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 90
{{- end }}
{{- if .Values.mariadb.objectStorage.enabled }}
---
# Test-only workload contract consumed by AQSH. Values are generic fixtures;
# production manifests should reference independently managed Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.mariadb.objectStorage.secretName }}
  namespace: {{ .Values.mariadb.namespace }}
stringData:
  S3_URL: {{ .Values.mariadb.objectStorage.endpoint | quote }}
  S3_BUCKET: {{ .Values.mariadb.objectStorage.bucket | quote }}
  S3_BACKUP_REGION: {{ .Values.mariadb.objectStorage.region | quote }}
  S3_SUBFOLDER: {{ required "mariadb.objectStorage.prefix is required when enabled" .Values.mariadb.objectStorage.prefix | quote }}
  S3_ACCESS_KEY: {{ .Values.mariadb.objectStorage.accessKey | quote }}
  S3_ACCESS_SECRET: {{ .Values.mariadb.objectStorage.secretKey | quote }}
{{- end }}
{{- end }}
