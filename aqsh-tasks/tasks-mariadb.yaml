defaults:
  timeout: 5m
  max_retry: 0
  queue: mariadb
tasks:
  common/hello:
    script: common/hello.sh
    timeout: 1m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: name
        env: NAME
        required: true
        type: string
  restart:
    script: mariadb/restart.sh
    description: "Operator-driven restart of a MariaDB cluster by patching the MariaDB CR restart annotation"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^mariadb-[0-9]+$'
      - name: context
        env: K8S_CONTEXT
        required: false
        type: string
        default: ""
      - name: resource
        env: MARIADB_RESOURCE
        required: false
        type: string
        default: mariadb
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb
      - name: container
        env: MARIADB_CONTAINER
        required: false
        type: string
        default: mariadb
      - name: target_pod
        env: TARGET_POD
        required: false
        type: string
        default: ""
      - name: include_primary
        env: INCLUDE_PRIMARY
        required: false
        type: string
        default: "false"
      - name: allow_role_change
        env: ALLOW_ROLE_CHANGE
        required: false
        type: string
        default: "false"
      - name: wait_timeout
        env: WAIT_TIMEOUT
        required: false
        type: string
        default: "300"
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: annotation_key
        env: RESTART_ANNOTATION_KEY
        required: false
        type: string
        default: aqsh.null-ptr-exception.dev/restarted-at
      - name: metadata_field
        env: RESTART_METADATA_FIELD
        required: false
        type: string
        default: auto
  status:
    script: mariadb/status.sh
    description: "Read-only MariaDB status summary for operator and native StatefulSet targets"
    timeout: 2m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: context
        env: K8S_CONTEXT
        required: false
        type: string
        default: ""
      - name: resource
        env: MARIADB_RESOURCE
        required: false
        type: string
        default: mariadb
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb
      - name: container
        env: MARIADB_CONTAINER
        required: false
        type: string
        default: mariadb
      - name: include_sql
        env: INCLUDE_SQL
        required: false
        type: string
        default: "true"
  sanity-check: &mariadb_sanity_check_task
    script: mariadb/sanity-check.sh
    description: "Read-only MariaDB health check: operator, service, SQL, replication, and semi-sync"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: context
        env: K8S_CONTEXT
        required: false
        type: string
        default: ""
      - name: resource
        env: MARIADB_RESOURCE
        required: false
        type: string
        default: mariadb
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb
      - name: container
        env: MARIADB_CONTAINER
        required: false
        type: string
        default: mariadb
      - name: lag_threshold
        env: LAG_THRESHOLD
        required: false
        type: string
        default: "1"
      - name: conn_warn_pct
        env: CONN_WARN_PCT
        required: false
        type: string
        default: "80"
      - name: long_tx_threshold
        env: LONG_TX_THRESHOLD
        required: false
        type: string
        default: "10"
      - name: expected_version
        env: EXPECTED_VERSION
        required: false
        type: string
        default: ""
      - name: check_operator
        env: CHECK_OPERATOR
        required: false
        type: string
        default: "true"
      - name: check_pods
        env: CHECK_PODS
        required: false
        type: string
        default: "true"
      - name: check_service
        env: CHECK_SERVICE
        required: false
        type: string
        default: "true"
      - name: check_sql
        env: CHECK_SQL
        required: false
        type: string
        default: "true"
      - name: check_replication
        env: CHECK_REPLICATION
        required: false
        type: string
        default: "true"
      - name: check_semi_sync
        env: CHECK_SEMI_SYNC
        required: false
        type: string
        default: "true"
  mariadb_sanity_check: *mariadb_sanity_check_task
  create-account:
    script: mariadb/create-account.sh
    description: "Create a new MariaDB account and grant scoped database privileges"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: context
        env: K8S_CONTEXT
        required: false
        type: string
        default: ""
      - name: resource
        env: MARIADB_RESOURCE
        required: false
        type: string
        default: mariadb
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb
      - name: container
        env: MARIADB_CONTAINER
        required: false
        type: string
        default: mariadb
      - name: database
        env: ACCOUNT_DATABASE
        required: true
        type: string
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: host
        env: ACCOUNT_HOST
        required: false
        type: string
        default: "%"
      - name: privileges
        env: ACCOUNT_PRIVILEGES
        required: true
        type: string
      - name: password_secret_name
        env: ACCOUNT_PASSWORD_SECRET_NAME
        required: false
        type: string
        default: ""
      - name: password_secret_key
        env: ACCOUNT_PASSWORD_SECRET_KEY
        required: false
        type: string
        default: password
      - name: password_secret_prefix
        env: ACCOUNT_PASSWORD_SECRET_PREFIX
        required: false
        type: string
        default: mariadb-account-
      - name: generate_password
        env: GENERATE_PASSWORD
        required: false
        type: string
        default: "true"
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: allow_global
        env: ALLOW_GLOBAL
        required: false
        type: string
        default: "false"
      - name: allow_admin_privileges
        env: ALLOW_ADMIN_PRIVILEGES
        required: false
        type: string
        default: "false"
  backup:
    script: backup/backup-mariadb.sh
    description: "Backup MariaDB database to MinIO"
    timeout: 15m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^mariadb-[0-9]+$'
      - name: minio_bucket
        env: MINIO_BUCKET
        required: false
        type: string
        default: db-backups
      - name: backup_databases
        env: BACKUP_DATABASES
        required: false
        type: string
        default: --all-databases
