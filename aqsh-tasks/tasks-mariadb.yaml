# Task definitions for the MariaDB runbook image.
#
# Pulled in via `include:` from `task-mariadb.yaml`, which owns the global
# `defaults:` (timeout / max_retry / queue). An included file MUST NOT define
# its own `defaults:` — aqsh rejects the whole config if it does.
tasks:
  common/hello:
    script: common/hello.sh
    timeout: 1m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: name
        env: NAME
        required: true
        type: string
  restart:
    script: mariadb/restart.sh
    description: "Operator-driven restart of a MariaDB cluster by patching the MariaDB CR restart annotation"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: resource
        env: MARIADB_RESOURCE
        required: false
        type: string
        default: mariadb
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
      - name: container
        env: MARIADB_CONTAINER
        required: false
        type: string
        default: mariadb
      - name: wait_timeout
        env: WAIT_TIMEOUT
        required: false
        type: string
        default: "300"
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: annotation_key
        env: RESTART_ANNOTATION_KEY
        required: false
        type: string
        default: aqsh.null-ptr-exception.dev/restarted-at
      - name: metadata_field
        env: RESTART_METADATA_FIELD
        required: false
        type: string
        default: auto
  switch-primary:
    script: mariadb/switch-primary.sh
    description: "Promote a replica to primary within one replicated MariaDB (AWS RDS FailoverDBCluster); operator-driven graceful switchover. Target is optional — omit it to auto-pick the most caught-up healthy replica."
    # Headroom for the forward switch (WAIT_TIMEOUT, 300s) plus bounded recovery
    # (rollback + optional eviction, RECOVERY_TIMEOUT each) so the final status
    # always gets emitted within the task budget.
    timeout: 15m
    allowed_groups: ["system:serviceaccounts"]
    # Note: the lag policy (LAG_THRESHOLD) and the auto-rollback safety behaviour
    # (ROLLBACK_ON_TIMEOUT) are deliberately NOT task inputs — they are
    # per-deployment policy / safety, env-overridable internal config only.
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: target
        env: TARGET_POD_INDEX
        required: false
        type: string
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
      - name: wait_timeout
        env: WAIT_TIMEOUT
        required: false
        type: string
        default: "300"
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
  set-runtime-param:
    script: mariadb/set-runtime-param.sh
    description: "Emergency online override of a MariaDB runtime parameter via SET GLOBAL (AWS RDS ModifyDBParameterGroup, dynamic). EPHEMERAL — reverts on restart; durable changes go through a config PR. Omit param to list supported params."
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: param
        env: RUNTIME_PARAM
        required: false
        type: string
        pattern: '^[a-z_]*$'
      - name: value
        env: RUNTIME_VALUE
        required: false
        type: string
      - name: scope
        env: RUNTIME_SCOPE
        required: false
        type: string
        default: "all"
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
  status:
    script: mariadb/status.sh
    description: "Read-only MariaDB status summary for operator and native StatefulSet targets"
    timeout: 2m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: resource
        env: MARIADB_RESOURCE
        required: false
        type: string
        default: mariadb
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
      - name: container
        env: MARIADB_CONTAINER
        required: false
        type: string
        default: mariadb
      - name: include_sql
        env: INCLUDE_SQL
        required: false
        type: string
        default: "true"
  connection-usage:
    script: mariadb/connection-usage.sh
    description: "Read-only point-in-time MariaDB connection usage grouped by database account across all instance pods"
    timeout: 2m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: account_limit
        env: ACCOUNT_LIMIT
        required: false
        type: string
        default: "10"
        pattern: '^([1-9]|[1-4][0-9]|50)$'
  sanity-check: &mariadb_sanity_check_task
    script: mariadb/sanity-check.sh
    description: "Read-only MariaDB health check: operator, service, SQL, replication, and semi-sync"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: resource
        env: MARIADB_RESOURCE
        required: false
        type: string
        default: mariadb
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
      - name: container
        env: MARIADB_CONTAINER
        required: false
        type: string
        default: mariadb
      - name: lag_threshold
        env: LAG_THRESHOLD
        required: false
        type: string
        default: "1"
      - name: conn_warn_pct
        env: CONN_WARN_PCT
        required: false
        type: string
        default: "80"
      - name: long_tx_threshold
        env: LONG_TX_THRESHOLD
        required: false
        type: string
        default: "10"
      - name: expected_version
        env: EXPECTED_VERSION
        required: false
        type: string
        default: ""
      - name: check_operator
        env: CHECK_OPERATOR
        required: false
        type: string
        default: "true"
      - name: check_pods
        env: CHECK_PODS
        required: false
        type: string
        default: "true"
      - name: check_service
        env: CHECK_SERVICE
        required: false
        type: string
        default: "true"
      - name: check_sql
        env: CHECK_SQL
        required: false
        type: string
        default: "true"
      - name: check_replication
        env: CHECK_REPLICATION
        required: false
        type: string
        default: "true"
      - name: check_semi_sync
        env: CHECK_SEMI_SYNC
        required: false
        type: string
        default: "true"
  mariadb_sanity_check: *mariadb_sanity_check_task
  create-account:
    script: mariadb/create-account.sh
    description: "Create a new MariaDB account and grant scoped database privileges"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: resource
        env: MARIADB_RESOURCE
        required: false
        type: string
        default: mariadb
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
      - name: container
        env: MARIADB_CONTAINER
        required: false
        type: string
        default: mariadb
      - name: database
        env: ACCOUNT_DATABASE
        required: true
        type: string
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: host
        env: ACCOUNT_HOST
        required: false
        type: string
        default: "%"
      - name: privileges
        env: ACCOUNT_PRIVILEGES
        required: true
        type: string
      # The password Secret is a managed-database internal: its name is derived by
      # convention (mariadb-account-<username>), its key defaults to "password",
      # and the result returns it as password_secret.{name,key}. Not task inputs;
      # ACCOUNT_PASSWORD_SECRET_NAME / _KEY / _PREFIX stay as env overrides only.
      - name: generate_password
        env: GENERATE_PASSWORD
        required: false
        type: string
        default: "true"
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: allow_global
        env: ALLOW_GLOBAL
        required: false
        type: string
        default: "false"
      - name: allow_admin_privileges
        env: ALLOW_ADMIN_PRIVILEGES
        required: false
        type: string
        default: "false"
  blue-green/status:
    script: mariadb/blue-green/status.sh
    description: "Read MariaDB multiCluster, version, and replication status for blue/green runbooks"
    timeout: 2m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: resource
        env: MARIADB_RESOURCE
        required: false
        type: string
        default: mariadb
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb
      - name: container
        env: MARIADB_CONTAINER
        required: false
        type: string
        default: mariadb
  blue-green/create:
    script: mariadb/blue-green/create.sh
    description: "Provision Green from a Blue physical backup (backup -> bootstrap -> upgrade) in one task"
    timeout: 30m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: blue_name
        env: BLUE_NAME
        required: true
        type: string
      - name: green_name
        env: GREEN_NAME
        required: true
        type: string
      - name: green_namespace
        env: GREEN_NAMESPACE
        required: false
        type: string
        default: ""
      - name: green_image
        env: GREEN_IMAGE
        required: true
        type: string
      - name: target_image
        env: TARGET_IMAGE
        required: false
        type: string
        default: ""
      # Required by the public contract; internal-step (peer orchestration)
      # calls carry the orchestrator's own values to satisfy the schema.
      - name: peer_aqsh_url
        env: PEER_AQSH_URL
        required: true
        type: string
      - name: peer_token
        env: PEER_TOKEN
        required: true
        type: string
      - name: internal_step
        env: INTERNAL_STEP
        required: false
        type: string
        default: ""
      - name: backup_name
        env: BACKUP_NAME
        required: false
        type: string
        default: physicalbackup-blue
      # S3 backup location (bucket / prefix / endpoint) is NOT a task input: it is
      # resolved internally from deploy-time config + the per-namespace convention
      # (db-backups, mariadb/<namespace>, MINIO_ENDPOINT), the same one restore
      # reads. Blue writes with its own config; green re-resolves with its own, so
      # each cluster uses its own MinIO endpoint. BACKUP_BUCKET / BACKUP_PREFIX /
      # BACKUP_ENDPOINT stay env-readable as advanced overrides only.
      # S3 region + access credentials (region / access Secret / key names) are
      # managed-DB internals resolved from platform convention, not task inputs.
      # BACKUP_REGION / BACKUP_ACCESS_SECRET / BACKUP_ACCESS_KEY / BACKUP_SECRET_KEY
      # stay env-overridable only.
      - name: backup_target
        env: BACKUP_TARGET
        required: false
        type: string
        default: PreferReplica
      - name: backup_compression
        env: BACKUP_COMPRESSION
        required: false
        type: string
        default: bzip2
      # The MariaDB root Secret (name / key) is a managed-DB internal following the
      # platform convention (mariadb / password), not a task input. ROOT_SECRET_NAME
      # / ROOT_SECRET_KEY stay env-overridable only.
      - name: storage_size
        env: STORAGE_SIZE
        required: false
        type: string
        default: 1Gi
      - name: replicas
        env: REPLICAS
        required: false
        type: string
        default: "2"
      - name: gtid_domain_id
        env: GTID_DOMAIN_ID
        required: false
        type: string
        default: "1"
      - name: server_id_start_index
        env: SERVER_ID_START_INDEX
        required: false
        type: string
        default: "20"
      - name: blue_host
        env: BLUE_HOST
        required: false
        type: string
        default: peer-db-proxy.db-ops.svc.cluster.local
      - name: green_host
        env: GREEN_HOST
        required: false
        type: string
        default: ""
      - name: wait_timeout
        env: WAIT_TIMEOUT
        required: false
        type: string
        default: 10m
      - name: peer_timeout
        env: PEER_TIMEOUT
        required: false
        type: string
        default: "900"
      - name: lag_threshold
        env: LAG_THRESHOLD
        required: false
        type: string
        default: "0"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
  blue-green/switchover:
    script: mariadb/blue-green/switchover.sh
    description: "Switch the multiCluster primary from Blue to Green with built-in guardrails and rollback"
    timeout: 20m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: blue_name
        env: BLUE_NAME
        required: true
        type: string
      - name: green_name
        env: GREEN_NAME
        required: true
        type: string
      - name: green_namespace
        env: GREEN_NAMESPACE
        required: false
        type: string
        default: ""
      # Required by the public contract; internal-step (peer orchestration)
      # calls carry the orchestrator's own values to satisfy the schema.
      - name: peer_aqsh_url
        env: PEER_AQSH_URL
        required: true
        type: string
      - name: peer_token
        env: PEER_TOKEN
        required: true
        type: string
      - name: internal_step
        env: INTERNAL_STEP
        required: false
        type: string
        default: ""
      - name: primary
        env: BLUE_GREEN_PRIMARY
        required: false
        type: string
        default: ""
      - name: expected_primary
        env: EXPECTED_PRIMARY
        required: false
        type: string
        default: ""
      - name: expected_blue_version
        env: EXPECTED_BLUE_VERSION
        required: false
        type: string
        default: ""
      - name: expected_green_version
        env: EXPECTED_GREEN_VERSION
        required: false
        type: string
        default: ""
      - name: lag_threshold
        env: LAG_THRESHOLD
        required: false
        type: string
        default: "0"
      - name: check_replication
        env: CHECK_REPLICATION
        required: false
        type: string
        default: "true"
      - name: skip_write_probe
        env: SKIP_WRITE_PROBE
        required: false
        type: string
        default: "false"
      - name: database
        env: PROBE_DATABASE
        required: false
        type: string
        default: bgtest
      - name: table
        env: PROBE_TABLE
        required: false
        type: string
        default: events
      - name: id
        env: PROBE_ID
        required: false
        type: string
        default: "1"
      - name: note
        env: PROBE_NOTE
        required: false
        type: string
        default: aqsh-write-probe
      - name: peer_timeout
        env: PEER_TIMEOUT
        required: false
        type: string
        default: "540"
      - name: switchover_timeout
        env: SWITCHOVER_TIMEOUT
        required: false
        type: string
        default: "300"
      - name: long_tx_threshold
        env: LONG_TX_THRESHOLD
        required: false
        type: string
        default: "60"
      # Empty default on purpose: the orchestrator decides when the peer's
      # internal validate must enforce read_only (pre-switchover only).
      - name: expect_green_read_only
        env: EXPECT_GREEN_READ_ONLY
        required: false
        type: string
        default: ""
      # gtid_target / gtid_timeout are peer-orchestration internals (gtid-wait).
      - name: gtid_target
        env: GTID_TARGET
        required: false
        type: string
        default: ""
      - name: gtid_timeout
        env: GTID_TIMEOUT
        required: false
        type: string
        default: "0"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
  blue-green/delete:
    script: mariadb/blue-green/delete.sh
    description: "Delete a Green deployment (MariaDB CR, ExternalMariaDB refs, optional PhysicalBackup)"
    timeout: 6m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb-green
      - name: blue_name
        env: BLUE_NAME
        required: false
        type: string
        default: ""
      - name: delete_external
        env: DELETE_EXTERNAL
        required: false
        type: string
        default: "true"
      - name: backup_name
        env: BACKUP_NAME
        required: false
        type: string
        default: ""
      - name: wait_timeout
        env: WAIT_TIMEOUT
        required: false
        type: string
        default: 5m
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
  backup:
    script: backup/backup-mariadb.sh
    description: "Create a logical backup for the database identified by namespace"
    timeout: 15m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
  physical-backup:
    script: mariadb/physical-backup.sh
    description: "Create a restorable physical backup for the database identified by namespace"
    timeout: 20m
    allowed_groups: ["system:serviceaccounts"]
    # The namespace is the database identity; the S3 backup location and
    # credentials are platform internals resolved automatically (env-overridable
    # but not task inputs), matching restore.
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      # wait_timeout doubles as the wait switch: "0" returns without waiting,
      # any positive duration (e.g. 10m) waits up to that long for Complete.
      - name: wait_timeout
        env: WAIT_TIMEOUT
        required: false
        type: string
        default: 10m
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
  logical-backup:
    script: mariadb/logical-backup.sh
    description: "Create a logical backup for the database identified by namespace"
    timeout: 20m
    allowed_groups: ["system:serviceaccounts"]
    # Same user-facing surface as physical-backup, minus the physical-only
    # target/compression knobs: the namespace is the database identity; the S3
    # location and credentials are platform internals resolved automatically.
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      # wait_timeout doubles as the wait switch: "0" returns without waiting,
      # any positive duration (e.g. 10m) waits up to that long for Complete.
      - name: wait_timeout
        env: WAIT_TIMEOUT
        required: false
        type: string
        default: 10m
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
  list-backups:
    script: backup/list-backups-mariadb.sh
    description: "List backups for the database identified by namespace; read-only"
    timeout: 2m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
  delete-backup:
    script: backup/delete-backup-mariadb.sh
    description: "Delete a named backup for the database identified by namespace; mutating (dry_run + confirm)"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: backup
        env: BACKUP_NAME
        required: true
        type: string
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
  restore:
    script: mariadb/restore.sh
    description: "Restore the database identified by namespace from a physical backup, optionally to a point in time"
    timeout: 20m
    allowed_groups: ["system:serviceaccounts"]
    # The namespace identifies the managed database; the engine version, storage
    # size, restored instance name, source instance, backup location, and
    # credentials are platform internals resolved automatically (some remain
    # env-readable as advanced operator overrides, but are not task inputs).
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: target_time
        env: TARGET_TIME
        required: false
        type: string
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      # wait_timeout doubles as the wait switch: "0" returns without waiting,
      # any positive duration (e.g. 10m) waits up to that long for Ready.
      - name: wait_timeout
        env: WAIT_TIMEOUT
        required: false
        type: string
        default: 10m
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
  logical-restore:
    script: mariadb/logical-restore.sh
    description: "Restore the database identified by namespace from a logical backup into a new database instance"
    timeout: 20m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      # Which Backup to restore from; omit to use the most recent one.
      - name: backup
        env: BACKUP_NAME
        required: false
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      # wait_timeout doubles as the wait switch: "0" returns without waiting,
      # any positive duration (e.g. 10m) waits up to that long for Ready.
      - name: wait_timeout
        env: WAIT_TIMEOUT
