apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-proxy
  namespace: db-ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-proxy
  template:
    metadata:
      labels:
        app: nginx-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
            - containerPort: 27017
              name: mongo
            - containerPort: 3306
              name: mariadb
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: nginx-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: peer-db-proxy
  namespace: db-ops
spec:
  type: NodePort
  selector:
    app: nginx-proxy
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30083
    - name: mongo
      port: 27017
      targetPort: 27017
    - name: mariadb
      port: 3306
      targetPort: 3306
