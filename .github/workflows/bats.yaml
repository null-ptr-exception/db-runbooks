name: BATS Integration Tests

'on':
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - db_mode: single
            use_mariadb_operator: "true"
          - db_mode: single
            use_mariadb_operator: "false"
          - db_mode: dual
            use_mariadb_operator: "true"
          - db_mode: dual
            use_mariadb_operator: "false"
    env:
      DB_MODE: ${{ matrix.db_mode }}
      USE_MARIADB_OPERATOR: ${{ matrix.use_mariadb_operator }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Tune kernel limits for Kind
        run: |
          sudo sysctl fs.inotify.max_user_watches=524288
          sudo sysctl fs.inotify.max_user_instances=512

      - name: Activate mise
        run: mise trust && mise install

      - name: Run BATS tests (DB_MODE=${{ matrix.db_mode }}, USE_MARIADB_OPERATOR=${{ matrix.use_mariadb_operator }})
        run: ./scripts/test.sh

      - name: Tear down clusters
        if: always()
        run: ./scripts/teardown.sh

  infra:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Tune kernel limits for Kind
        run: |
          sudo sysctl fs.inotify.max_user_watches=524288
          sudo sysctl fs.inotify.max_user_instances=512

      - name: Activate mise
        run: mise trust && mise install

      - name: Install bats helpers (pinned versions)
        run: |
          [ -d "tests/test_helper/bats-support" ] || git clone --depth 1 --branch v0.3.0 "https://github.com/bats-core/bats-support.git" "tests/test_helper/bats-support"
          [ -d "tests/test_helper/bats-assert" ]  || git clone --depth 1 --branch v2.1.0 "https://github.com/bats-core/bats-assert.git" "tests/test_helper/bats-assert"

      - name: Run infra e2e tests
        run: bats tests/infra/

      - name: Tear down infra clusters
        if: always()
        run: |
          kind delete cluster --name cluster-a 2>/dev/null || true
          kind delete cluster --name cluster-b 2>/dev/null || true
          docker rm -f registry 2>/dev/null || true
