repositories:
  - name: istio
    url: https://istio-release.storage.googleapis.com/charts

helmDefaults:
  skipSchemaValidation: true

releases:
  # cluster-a: fedauth reader RBAC
  - name: mariadb-rbac-a
    chart: ../chart
    namespace: db-ops
    createNamespace: true
    kubeContext: kind-cluster-a
    values:
      - federatedAuthReader:
          enabled: true

  # cluster-b: fedauth reader RBAC + test-client
  - name: mariadb-client
    chart: ../chart
    namespace: db-ops
    createNamespace: true
    kubeContext: kind-cluster-b
    values:
      - federatedAuthReader:
          enabled: true
        testClient:
          enabled: true

  # cluster-a: MariaDB instance (creates mariadb-1 namespace)
  - name: mariadb-1
    chart: ../chart
    namespace: mariadb-1
    createNamespace: true
    kubeContext: kind-cluster-a
    values:
      - mariadb:
          enabled: true
          namespace: mariadb-1
          # Replicated so the switch-primary e2e can promote a replica.
          replicas: 3
          objectStorage:
            enabled: true
            secretName: mariadb-storage-primary
            prefix: tenant-a/database
        databaseGateway:
          enabled: true
          testClient:
            enabled: true

  # cluster-a: a separate Envoy workload owned and lifecycle-managed by the
  # MariaDB namespace. The shared control-plane gateway is intentionally not
  # used for these database TCP listeners.
  - name: database-gateway
    chart: istio/gateway
    version: 1.24.3
    namespace: mariadb-1
    createNamespace: true
    kubeContext: kind-cluster-a
    needs:
      - kind-cluster-a/mariadb-1/mariadb-1
    values:
      - autoscaling:
          enabled: false
        service:
          type: ClusterIP
          ports:
            - name: status-port
              port: 15021
              protocol: TCP
              targetPort: 15021
            - name: tcp-mariadb-rw
              port: 3306
              protocol: TCP
              targetPort: 3306
            - name: tcp-mariadb-ro
              port: 3307
              protocol: TCP
              targetPort: 3307
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

  # A second database with an independent workload contract proves one AQSH
  # deployment can select different per-database object prefixes/references.
  - name: mariadb-2
    chart: ../chart
    namespace: mariadb-2
    createNamespace: true
    kubeContext: kind-cluster-a
    values:
      - mariadb:
          enabled: true
          namespace: mariadb-2
          objectStorage:
            enabled: true
            secretName: mariadb-storage-secondary
            endpoint: http://minio-secondary.kind-b.test:30080
            bucket: db-backups-secondary
            prefix: tenant-b/database

  # cluster-b: MinIO for backup tests
  - name: minio
    chart: ../chart
    namespace: minio
    createNamespace: true
    kubeContext: kind-cluster-b
    values:
      - minio:
          enabled: true
        gateway:
          enabled: true
          virtualServices:
            - name: minio
              host: "minio.kind-b.test"
              backendHost: minio.minio.svc.cluster.local
              backendPort: 9000
            - name: minio-secondary
              host: "minio-secondary.kind-b.test"
              backendHost: minio.minio.svc.cluster.local
              backendPort: 9000

  # cluster-a: fedauth, aqsh-mariadb, redis, rbac, gateway
  - name: mariadb-server
    chart: ../chart
    namespace: db-ops
    createNamespace: true
    kubeContext: kind-cluster-a
    needs:
      - kind-cluster-a/mariadb-1/mariadb-1
    values:
      - federatedAuth:
          enabled: true
          authorizedClients:
            - "cluster-a/db-ops/kube-auth-proxy"
            - "cluster-b/db-ops/kube-auth-proxy"
        redis:
          enabled: true
        aqsh:
          enabled: true
          tasksConfig: /etc/aqsh/task-mariadb.yaml
          workerQueues: mariadb
          config:
            mariadb.env: |
              MINIO_ENDPOINT=http://minio.kind-b.test:30080
              SECRETS_PROTECTED_NAMES_DEFAULT=mariadb,minio
              SECRETS_AUTODETECT_DEFAULT=false
          authProxy:
            tokenReviewURL: "http://fedauth-mariadb.kind-a.test:30080"
        mariadbRbac:
          enabled: true
          namespaces:
            - mariadb-2
        gateway:
          enabled: true
          virtualServices:
            - name: fedauth-mariadb
              host: "fedauth-mariadb.kind-a.test"
              backendHost: kube-federated-auth.db-ops.svc.cluster.local
              backendPort: 8080
            - name: aqsh-mariadb
              host: "aqsh-mariadb.kind-a.test"
              backendHost: aqsh.db-ops.svc.cluster.local
              backendPort: 4180

  # cluster-b: MariaDB instance (creates mariadb-1 namespace)
  - name: mariadb-1-b
    chart: ../chart
    namespace: mariadb-1
    createNamespace: true
    kubeContext: kind-cluster-b
    values:
      - mariadb:
          enabled: true
          namespace: mariadb-1
          objectStorage:
            enabled: true
            secretName: mariadb-storage-destination
            prefix: tenant-a/database

  # cluster-b: aqsh-mariadb, redis, rbac, gateway
  - name: mariadb-server-b
    chart: ../chart
    namespace: db-ops
    createNamespace: true
    kubeContext: kind-cluster-b
    needs:
      - kind-cluster-b/mariadb-1/mariadb-1-b
    values:
      - redis:
          enabled: true
        aqsh:
          enabled: true
          tasksConfig: /etc/aqsh/task-mariadb.yaml
          workerQueues: mariadb
          config:
            mariadb.env: |
              MINIO_ENDPOINT=http://minio.kind-b.test:30080
              SECRETS_PROTECTED_NAMES_DEFAULT=mariadb,minio
              SECRETS_AUTODETECT_DEFAULT=false
          authProxy:
            tokenReviewURL: "http://fedauth-mariadb.kind-a.test:30080"
        mariadbRbac:
          enabled: true
        gateway:
          enabled: true
          virtualServices:
            - name: aqsh-mariadb-b
              host: "aqsh-mariadb.kind-b.test"
              backendHost: aqsh.db-ops.svc.cluster.local
              backendPort: 4180
