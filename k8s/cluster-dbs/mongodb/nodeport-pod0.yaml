apiVersion: v1
kind: Service
metadata:
  name: mongodb-0-nodeport
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: database
spec:
  type: NodePort
  selector:
    statefulset.kubernetes.io/pod-name: mongodb-0
  ports:
    - port: 27017
      targetPort: 27017
      nodePort: 30090
