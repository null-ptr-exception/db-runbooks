{{- if .Values.mariadbRbac.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aqsh-mariadb-manager
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    resourceNames: ["mariadb"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  # Hand-rolled physical restore on a legacy operator pre-creates the datadir PVC
  # and runs a prepare Job (mbstream + mariabackup --prepare) before the new
  # instance adopts the PVC.
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["secrets"]
    # patch: tag the managed account password Secret with an owner annotation
    # (create-account collision guard).
    verbs: ["get", "create", "patch"]
  - apiGroups: [{{ .Values.mariadb.operatorGroup | quote }}, "mariadb.mmontes.io"]
    resources: ["mariadbs"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  - apiGroups: [{{ .Values.mariadb.operatorGroup | quote }}, "mariadb.mmontes.io"]
    resources: ["externalmariadbs", "physicalbackups"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
  # Logical backup/restore via the operator Backup/Restore CRs (present on both
  # operator generations).
  - apiGroups: [{{ .Values.mariadb.operatorGroup | quote }}, "mariadb.mmontes.io"]
    resources: ["backups", "restores"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aqsh-mariadb-manager
  namespace: {{ .Values.mariadb.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aqsh-mariadb-manager
subjects:
  - kind: ServiceAccount
    name: kube-auth-proxy
    namespace: {{ .Release.Namespace }}
{{- end }}
