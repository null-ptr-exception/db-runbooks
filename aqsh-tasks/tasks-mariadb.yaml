defaults:
  timeout: 5m
  max_retry: 0
  queue: mariadb
tasks:
  common/hello:
    script: common/hello.sh
    timeout: 1m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: name
        env: NAME
        required: true
        type: string
  restart:
    script: mariadb/restart.sh
    description: "Operator-driven restart of a MariaDB cluster by patching the MariaDB CR restart annotation"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^mariadb-[0-9]+$'
      - name: context
        env: K8S_CONTEXT
        required: false
        type: string
        default: ""
      - name: resource
        env: MARIADB_RESOURCE
        required: false
        type: string
        default: mariadb
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb
      - name: container
        env: MARIADB_CONTAINER
        required: false
        type: string
        default: mariadb
      - name: wait_timeout
        env: WAIT_TIMEOUT
        required: false
        type: string
        default: "300"
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: annotation_key
        env: RESTART_ANNOTATION_KEY
        required: false
        type: string
        default: aqsh.null-ptr-exception.dev/restarted-at
      - name: metadata_field
        env: RESTART_METADATA_FIELD
        required: false
        type: string
        default: auto
  status:
    script: mariadb/status.sh
    description: "Read-only MariaDB status summary for operator and native StatefulSet targets"
    timeout: 2m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: context
        env: K8S_CONTEXT
        required: false
        type: string
        default: ""
      - name: resource
        env: MARIADB_RESOURCE
        required: false
        type: string
        default: mariadb
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb
      - name: container
        env: MARIADB_CONTAINER
        required: false
        type: string
        default: mariadb
      - name: include_sql
        env: INCLUDE_SQL
        required: false
        type: string
        default: "true"
  sanity-check: &mariadb_sanity_check_task
    script: mariadb/sanity-check.sh
    description: "Read-only MariaDB health check: operator, service, SQL, replication, and semi-sync"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: context
        env: K8S_CONTEXT
        required: false
        type: string
        default: ""
      - name: resource
        env: MARIADB_RESOURCE
        required: false
        type: string
        default: mariadb
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb
      - name: container
        env: MARIADB_CONTAINER
        required: false
        type: string
        default: mariadb
      - name: lag_threshold
        env: LAG_THRESHOLD
        required: false
        type: string
        default: "1"
      - name: conn_warn_pct
        env: CONN_WARN_PCT
        required: false
        type: string
        default: "80"
      - name: long_tx_threshold
        env: LONG_TX_THRESHOLD
        required: false
        type: string
        default: "10"
      - name: expected_version
        env: EXPECTED_VERSION
        required: false
        type: string
        default: ""
      - name: check_operator
        env: CHECK_OPERATOR
        required: false
        type: string
        default: "true"
      - name: check_pods
        env: CHECK_PODS
        required: false
        type: string
        default: "true"
      - name: check_service
        env: CHECK_SERVICE
        required: false
        type: string
        default: "true"
      - name: check_sql
        env: CHECK_SQL
        required: false
        type: string
        default: "true"
      - name: check_replication
        env: CHECK_REPLICATION
        required: false
        type: string
        default: "true"
      - name: check_semi_sync
        env: CHECK_SEMI_SYNC
        required: false
        type: string
        default: "true"
  mariadb_sanity_check: *mariadb_sanity_check_task
  create-account:
    script: mariadb/create-account.sh
    description: "Create a new MariaDB account and grant scoped database privileges"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: context
        env: K8S_CONTEXT
        required: false
        type: string
        default: ""
      - name: resource
        env: MARIADB_RESOURCE
        required: false
        type: string
        default: mariadb
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb
      - name: container
        env: MARIADB_CONTAINER
        required: false
        type: string
        default: mariadb
      - name: database
        env: ACCOUNT_DATABASE
        required: true
        type: string
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: host
        env: ACCOUNT_HOST
        required: false
        type: string
        default: "%"
      - name: privileges
        env: ACCOUNT_PRIVILEGES
        required: true
        type: string
      - name: password_secret_name
        env: ACCOUNT_PASSWORD_SECRET_NAME
        required: false
        type: string
        default: ""
      - name: password_secret_key
        env: ACCOUNT_PASSWORD_SECRET_KEY
        required: false
        type: string
        default: password
      - name: password_secret_prefix
        env: ACCOUNT_PASSWORD_SECRET_PREFIX
        required: false
        type: string
        default: mariadb-account-
      - name: generate_password
        env: GENERATE_PASSWORD
        required: false
        type: string
        default: "true"
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: allow_global
        env: ALLOW_GLOBAL
        required: false
        type: string
        default: "false"
      - name: allow_admin_privileges
        env: ALLOW_ADMIN_PRIVILEGES
        required: false
        type: string
        default: "false"
  blue-green/status:
    script: mariadb/blue-green/status.sh
    description: "Read MariaDB multiCluster, version, and replication status for blue/green runbooks"
    timeout: 2m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: resource
        env: MARIADB_RESOURCE
        required: false
        type: string
        default: mariadb
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb
      - name: container
        env: MARIADB_CONTAINER
        required: false
        type: string
        default: mariadb
  blue-green/validate:
    script: mariadb/blue-green/validate.sh
    description: "Validate MariaDB version, multiCluster primary, and replication catch-up"
    timeout: 3m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: resource
        env: MARIADB_RESOURCE
        required: false
        type: string
        default: mariadb
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb
      - name: container
        env: MARIADB_CONTAINER
        required: false
        type: string
        default: mariadb
      - name: expected_version
        env: EXPECTED_VERSION
        required: false
        type: string
        default: ""
      - name: expected_primary
        env: EXPECTED_PRIMARY
        required: false
        type: string
        default: ""
      - name: check_replication
        env: CHECK_REPLICATION
        required: false
        type: string
        default: "true"
      - name: lag_threshold
        env: LAG_THRESHOLD
        required: false
        type: string
        default: "0"
  blue-green/create-physical-backup:
    script: mariadb/blue-green/create-physical-backup.sh
    description: "Create a PhysicalBackup descriptor for bootstrapping Green"
    timeout: 12m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb
      - name: backup_name
        env: BACKUP_NAME
        required: false
        type: string
        default: physicalbackup-blue
      - name: backup_bucket
        env: BACKUP_BUCKET
        required: true
        type: string
      - name: backup_prefix
        env: BACKUP_PREFIX
        required: true
        type: string
      - name: backup_endpoint
        env: BACKUP_ENDPOINT
        required: true
        type: string
      - name: backup_region
        env: BACKUP_REGION
        required: false
        type: string
        default: us-east-1
      - name: backup_access_secret
        env: BACKUP_ACCESS_SECRET
        required: false
        type: string
        default: minio
      - name: backup_access_key
        env: BACKUP_ACCESS_KEY
        required: false
        type: string
        default: access-key-id
      - name: backup_secret_key
        env: BACKUP_SECRET_KEY
        required: false
        type: string
        default: secret-access-key
      - name: backup_target
        env: BACKUP_TARGET
        required: false
        type: string
        default: PreferReplica
      - name: backup_compression
        env: BACKUP_COMPRESSION
        required: false
        type: string
        default: bzip2
      - name: wait_timeout
        env: WAIT_TIMEOUT
        required: false
        type: string
        default: 10m
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
  blue-green/bootstrap-green:
    script: mariadb/blue-green/bootstrap-green.sh
    description: "Bootstrap Green from a Blue PhysicalBackup descriptor"
    timeout: 12m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb-green
      - name: blue_name
        env: BLUE_NAME
        required: true
        type: string
      - name: green_image
        env: GREEN_IMAGE
        required: true
        type: string
      - name: root_secret_name
        env: ROOT_SECRET_NAME
        required: false
        type: string
        default: mariadb
      - name: root_secret_key
        env: ROOT_SECRET_KEY
        required: false
        type: string
        default: password
      - name: storage_size
        env: STORAGE_SIZE
        required: false
        type: string
        default: 1Gi
      - name: replicas
        env: REPLICAS
        required: false
        type: string
        default: "2"
      - name: backup_bucket
        env: BACKUP_BUCKET
        required: true
        type: string
      - name: backup_prefix
        env: BACKUP_PREFIX
        required: true
        type: string
      - name: backup_endpoint
        env: BACKUP_ENDPOINT
        required: true
        type: string
      - name: backup_region
        env: BACKUP_REGION
        required: false
        type: string
        default: us-east-1
      - name: backup_access_secret
        env: BACKUP_ACCESS_SECRET
        required: false
        type: string
        default: minio
      - name: backup_access_key
        env: BACKUP_ACCESS_KEY
        required: false
        type: string
        default: access-key-id
      - name: backup_secret_key
        env: BACKUP_SECRET_KEY
        required: false
        type: string
        default: secret-access-key
      - name: gtid_domain_id
        env: GTID_DOMAIN_ID
        required: false
        type: string
        default: "1"
      - name: server_id_start_index
        env: SERVER_ID_START_INDEX
        required: false
        type: string
        default: "20"
      - name: blue_host
        env: BLUE_HOST
        required: false
        type: string
        default: peer-db-proxy.db-ops.svc.cluster.local
      - name: green_host
        env: GREEN_HOST
        required: false
        type: string
        default: ""
      - name: wait_ready
        env: WAIT_READY
        required: false
        type: string
        default: "true"
      - name: wait_timeout
        env: WAIT_TIMEOUT
        required: false
        type: string
        default: 10m
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
  blue-green/upgrade-green:
    script: mariadb/blue-green/upgrade-green.sh
    description: "Patch Green to the target MariaDB image and wait for readiness"
    timeout: 12m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb-green
      - name: target_image
        env: TARGET_IMAGE
        required: true
        type: string
      - name: wait_ready
        env: WAIT_READY
        required: false
        type: string
        default: "true"
      - name: wait_timeout
        env: WAIT_TIMEOUT
        required: false
        type: string
        default: 10m
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
  blue-green/maintenance:
    script: mariadb/blue-green/maintenance.sh
    description: "Enable MariaDB maintenance/read-only mode before blue/green switchover"
    timeout: 2m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: read_only
        env: READ_ONLY
        required: false
        type: string
        default: "true"
      - name: cordon
        env: CORDON
        required: false
        type: string
        default: "true"
      - name: drain_connections
        env: DRAIN_CONNECTIONS
        required: false
        type: string
        default: "true"
      - name: drain_grace_period_seconds
        env: DRAIN_GRACE_PERIOD_SECONDS
        required: false
        type: string
        default: "30"
  blue-green/set-primary:
    script: mariadb/blue-green/set-primary.sh
    description: "Patch spec.multiCluster.primary for promotion or demotion"
    timeout: 2m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb
      - name: primary
        env: BLUE_GREEN_PRIMARY
        required: true
        type: string
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
  blue-green/write-probe:
    script: mariadb/blue-green/write-probe.sh
    description: "Insert a small probe row through the current primary to prove writes work"
    timeout: 2m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: mdb
        env: MARIADB_NAME
        required: false
        type: string
        default: mariadb
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: database
        env: PROBE_DATABASE
        required: false
        type: string
        default: bgtest
      - name: table
        env: PROBE_TABLE
        required: false
        type: string
        default: events
      - name: id
        env: PROBE_ID
        required: false
        type: string
        default: "1"
      - name: note
        env: PROBE_NOTE
        required: false
        type: string
        default: aqsh-write-probe
  backup:
    script: backup/backup-mariadb.sh
    description: "Backup MariaDB database to MinIO"
    timeout: 15m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^mariadb-[0-9]+$'
      - name: minio_bucket
        env: MINIO_BUCKET
        required: false
        type: string
        default: db-backups
      - name: backup_databases
        env: BACKUP_DATABASES
        required: false
        type: string
        default: --all-databases
