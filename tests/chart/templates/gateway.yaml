{{- if .Values.gateway.enabled }}
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: {{ .Release.Name }}-gateway
  namespace: istio-ingress
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        {{- range .Values.gateway.hosts }}
        - {{ . | quote }}
        {{- end }}
{{- range .Values.gateway.virtualServices }}
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ .name }}
  namespace: istio-ingress
spec:
  hosts:
    - {{ .host | quote }}
  gateways:
    - {{ $.Release.Name }}-gateway
  http:
    - route:
        - destination:
            host: {{ .backendHost }}
            port:
              number: {{ .backendPort }}
{{- end }}
{{- end }}
