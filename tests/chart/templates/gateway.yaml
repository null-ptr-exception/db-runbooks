{{- if .Values.gateway.enabled }}
{{- range .Values.gateway.virtualServices }}
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
spec:
  hosts:
    - {{ .host | quote }}
  gateways:
    - istio-ingress/shared-gateway
  http:
    - route:
        - destination:
            host: {{ .backendHost }}
            port:
              number: {{ .backendPort }}
{{- end }}
{{- end }}
