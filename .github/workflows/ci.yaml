name: CI

'on':
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck python3-pip bats jq
          python3 -m pip install yamllint

      - name: Run ShellCheck
        run: |
          find . -type f -name '*.sh' -print0 \
            | xargs -0 --no-run-if-empty shellcheck --severity=warning -x

      - name: Run Bats unit tests
        run: |
          if [ -d tests/unit ]; then
            ./scripts/install-bats-libs.sh
            bats --recursive tests/unit
          fi

      - name: Run Hadolint
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: aqsh-tasks/Dockerfile
          ignore: DL3008,DL4006

      - name: Run yamllint
        run: |
          find k8s -type f \( -name '*.yaml' -o -name '*.yml' -o -name '*.yaml.tpl' -o -name '*.yml.tpl' \) -print0 \
            | xargs -0 --no-run-if-empty yamllint -c .yamllint.yaml

  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build aqsh-mariadb image
        run: docker build --build-arg TASKS_YAML=tasks-mariadb.yaml -t aqsh-mariadb:ci ./aqsh-tasks

      - name: Build aqsh-mongodb image
        run: docker build --build-arg TASKS_YAML=tasks-mongodb.yaml -t aqsh-mongodb:ci ./aqsh-tasks
