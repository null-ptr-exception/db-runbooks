{{- if .Values.mongodbRbac.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aqsh-mongo-manager
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    resourceNames: [{{ .Values.mongodb.stsName | default "mongodb" | quote }}]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.mongodb.credentialSecret | default "mongodb-credentials" | quote }}]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: [{{ .Values.mongodb.recoveryConfigmap | default "mongodb-recovery-config" | quote }}]
    verbs: ["get", "patch"]
  # create cannot be scoped by resourceNames (Kubernetes RBAC ignores
  # resourceNames for create requests — there's no object yet to match
  # against), so this is intentionally namespace-wide for configmaps, not
  # pinned to recoveryConfigmap. G1 self-heal uses it to create the recovery
  # ConfigMap when it's missing entirely, not just the init container.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aqsh-mongo-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aqsh-mongo-node-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aqsh-mongo-node-reader
subjects:
  - kind: ServiceAccount
    name: kube-auth-proxy
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aqsh-mongo-manager
  namespace: {{ .Values.mongodb.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aqsh-mongo-manager
subjects:
  - kind: ServiceAccount
    name: kube-auth-proxy
    namespace: {{ .Release.Namespace }}
{{- end }}
