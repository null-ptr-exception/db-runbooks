# Task definitions for the MongoDB runbook image.
#
# Pulled in via `include:` from `task-mongodb.yaml`, which owns the global
# `defaults:` (timeout / max_retry / queue). An included file MUST NOT define
# its own `defaults:` — aqsh rejects the whole config if it does.
tasks:
  common/hello:
    script: common/hello.sh
    timeout: 1m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: name
        env: NAME
        required: true
        type: string
  restart:
    script: mongodb/restart.sh
    description: "Rolling restart of a MongoDB StatefulSet"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
  sanity-check:
    script: mongodb/sanity-check.sh
    description: "3-layer health check: K8s infrastructure, MongoDB connectivity, MongoDB internals"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
  backup:
    script: backup/backup-mongodb.sh
    description: "Backup MongoDB database to MinIO"
    timeout: 15m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: minio_bucket
        env: MINIO_BUCKET
        required: false
        type: string
        default: db-backups
  create-account:
    script: mongodb/account/create-account.sh
    description: "Create or recreate a run MongoDB account"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        default: mongo-1
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: auth_db
        env: ACCOUNT_AUTH_DB
        required: false
        type: string
        default: admin
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: roles_json
        env: ACCOUNT_ROLES_JSON
        required: false
        type: string
        default: ""
      - name: database
        env: ACCOUNT_DATABASE
        required: false
        type: string
        default: admin
      - name: validity_days
        env: VALIDITY_DAYS
        required: false
        type: string
        default: "14"
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: allow_existing
        env: ALLOW_EXISTING
        required: false
        type: string
        default: "false"
      - name: password_length
        env: PASSWORD_LENGTH
        required: false
        type: string
        default: "24"
      - name: password_special_chars
        env: PASSWORD_SPECIAL_CHARS
        required: false
        type: string
        default: "!@#%^*_-+=."
      - name: password_special_max
        env: PASSWORD_SPECIAL_MAX
        required: false
        type: string
        default: "4"
      - name: password_delivery_mode
        env: PASSWORD_DELIVERY_MODE
        required: false
        type: string
        default: one_time_plaintext
      - name: recipient_pgp_pubkey
        env: RECIPIENT_PGP_PUBKEY
        required: false
        type: string
        default: ""
      - name: request_id
        env: REQUEST_ID
        required: false
        type: string
        default: ""
      - name: requested_by
        env: REQUESTED_BY
        required: false
        type: string
        default: ""
  delete-account:
    script: mongodb/account/delete-account.sh
    description: "Delete an existing MongoDB account"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        default: mongo-1
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: auth_db
        env: ACCOUNT_AUTH_DB
        required: false
        type: string
        default: admin
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: delete_reason
        env: DELETE_REASON
        required: false
        type: string
        default: MANUAL_DELETE
  ban-account:
    script: mongodb/account/ban-account.sh
    description: "Ban an account by removing all roles"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        default: mongo-1
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: auth_db
        env: ACCOUNT_AUTH_DB
        required: false
        type: string
        default: admin
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: ban_reason
        env: BAN_REASON
        required: false
        type: string
        default: SECURITY_POLICY
  extend-expiry:
    script: mongodb/account/extend-expiry.sh
    description: "Extend run account expiry"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        default: mongo-1
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: auth_db
        env: ACCOUNT_AUTH_DB
        required: false
        type: string
        default: admin
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: extend_days
        env: EXTEND_DAYS
        required: true
        type: string
      - name: allow_terminal_override
        env: ALLOW_TERMINAL_OVERRIDE
        required: false
        type: string
        default: "false"
  update-account-roles:
    script: mongodb/account/update-account-roles.sh
    description: "Update account role to database bindings"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        default: mongo-1
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: auth_db
        env: ACCOUNT_AUTH_DB
        required: false
        type: string
        default: admin
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: roles_json
        env: ACCOUNT_ROLES_JSON
        required: true
        type: string
  force-permanent:
    script: mongodb/account/force-permanent.sh
    description: "Force a run account into permanent state"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        default: mongo-1
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: auth_db
        env: ACCOUNT_AUTH_DB
        required: false
        type: string
        default: admin
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: forced_by
        env: FORCED_BY
        required: false
        type: string
        default: unknown
      - name: force_reason
        env: FORCE_REASON
        required: false
        type: string
        default: MANUAL_FORCE_PERMANENT
  reset-password:
    script: mongodb/account/reset-password.sh
    description: "Reset account password and optionally restart run lifecycle"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        default: mongo-1
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: auth_db
        env: ACCOUNT_AUTH_DB
        required: false
        type: string
        default: admin
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: validity_days
        env: VALIDITY_DAYS
        required: false
        type: string
        default: "14"
      - name: reset_override
        env: RESET_OVERRIDE
        required: false
        type: string
        default: "false"
      - name: password_length
        env: PASSWORD_LENGTH
        required: false
        type: string
        default: "24"
      - name: password_special_chars
        env: PASSWORD_SPECIAL_CHARS
        required: false
        type: string
        default: "!@#%^*_-+=."
      - name: password_special_max
        env: PASSWORD_SPECIAL_MAX
        required: false
        type: string
        default: "4"
      - name: password_delivery_mode
        env: PASSWORD_DELIVERY_MODE
        required: false
        type: string
        default: one_time_plaintext
      - name: recipient_pgp_pubkey
        env: RECIPIENT_PGP_PUBKEY
        required: false
        type: string
        default: ""
  reconcile-expiry:
    script: mongodb/account/reconcile-expiry.sh
    description: "Reconcile expired run accounts"
    timeout: 15m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        default: mongo-1
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
  recovery/pre-check:
    script: mongodb/recovery/pre-check.sh
    description: "Run G1-G8 pre-flight gates for a target pod (read-only)"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: target_pod
        env: RECOVERY_TARGET_POD
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: force_wipe
        env: FORCE_WIPE
        required: false
        type: string
        default: "false"
  recovery/wipe:
    script: mongodb/recovery/wipe.sh
    description: "Wipe corrupted pod data and trigger initial sync (runs G1-G8 gates first)"
    timeout: 10m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: target_pod
        env: RECOVERY_TARGET_POD
        required: false
        type: string
        default: ""
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: force_wipe
        env: FORCE_WIPE
        required: false
        type: string
        default: "false"
  recovery/reset:
    script: mongodb/recovery/reset.sh
    description: "Clear wipe-target and restore StatefulSet partition to locked state"
    timeout: 3m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
  recovery/status:
    script: mongodb/recovery/status.sh
    description: "Show current recovery state (wipe-target, partition, pod phases)"
    timeout: 2m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
  recovery/fix-no-primary:
    script: mongodb/recovery/fix-no-primary.sh
    description: "Restore primary when all RS members show SECONDARY (E1+E5 combined scenario)"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: level
        env: RECOVERY_LEVEL
        required: true
        type: string
        pattern: '^(diagnose|unfreeze|reconfig|force-primary)$'
      - name: force_primary_pod
        env: RECOVERY_FORCE_POD
        required: false
        type: string
        default: ""
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
  # Reconfig gateway (see docs/mongodb/reconfig.md). Deployment-naming fields
  # (sts_name, credential_*) are deliberately NOT task inputs — same
  # auto-detect tier as recovery/* (CLAUDE.md "Configuration Layers").
  reconfig/plan:
    script: mongodb/reconfig/plan.sh
    description: "Read-only risk report for a proposed RS reconfig (returns plan_hash)"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: ops_json
        env: RECONFIG_OPS_JSON
        required: true
        type: string
  reconfig/apply:
    script: mongodb/reconfig/apply.sh
    description: "Execute a planned RS reconfig (CAS on plan_hash; one reconfig step per op)"
    timeout: 10m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: ops_json
        env: RECONFIG_OPS_JSON
        required: true
        type: string
      - name: plan_hash
        env: RECONFIG_PLAN_HASH
        required: true
        type: string
        pattern: '^rcp[0-9a-f]{24}$'
      - name: override_reason
        env: OVERRIDE_REASON
        required: false
        type: string
        default: ""
      - name: requested_by
        env: REQUESTED_BY
        required: false
        type: string
        default: ""
      - name: request_id
        env: REQUEST_ID
        required: false
        type: string
        default: ""
  reconfig/force-dr:
    script: mongodb/reconfig/force-dr.sh
    description: "Break-glass forced reconfig for site-loss DR (dry_run -> confirm)"
    timeout: 10m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: incident_id
        env: INCIDENT_ID
        required: true
        type: string
        pattern: '^[A-Za-z0-9._-]+$'
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: plan_hash
        env: RECONFIG_PLAN_HASH
        required: false
        type: string
        default: ""
        pattern: '^(rcp[0-9a-f]{24})?$'
      - name: requested_by
        env: REQUESTED_BY
        required: false
        type: string
        default: ""
  reconfig/freeze:
    script: mongodb/reconfig/freeze.sh
    description: "Toggle the change-freeze annotation (blocks reconfig/apply, never force-dr)"
    timeout: 3m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: enabled
        env: FREEZE_ENABLED
        required: true
        type: string
        pattern: '^(true|false)$'
      - name: reason
        env: FREEZE_REASON
        required: false
        type: string
        default: ""
  recovery/recover:
    script: mongodb/recovery/recover.sh
    description: "One-call orchestrated recovery: gates -> wipe -> wait -> reset"
    timeout: 12m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: target_pod
        env: RECOVERY_TARGET_POD
        required: false
        type: string
        default: ""
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: force_wipe
        env: FORCE_WIPE
        required: false
        type: string
        default: "false"
      - name: wait_timeout
        env: RECOVERY_WAIT_TIMEOUT
        required: false
        type: string
        default: "300"
