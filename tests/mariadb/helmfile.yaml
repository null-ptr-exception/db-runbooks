releases:
  # cluster-a: fedauth reader RBAC
  - name: mariadb-rbac-a
    chart: ../chart
    namespace: db-ops
    createNamespace: true
    kubeContext: kind-cluster-a
    values:
      - federatedAuthReader:
          enabled: true

  # cluster-b: fedauth reader RBAC + test-client
  - name: mariadb-client
    chart: ../chart
    namespace: db-ops
    createNamespace: true
    kubeContext: kind-cluster-b
    values:
      - federatedAuthReader:
          enabled: true
        testClient:
          enabled: true

  # cluster-a: MariaDB instance (creates mariadb-1 namespace)
  - name: mariadb-1
    chart: ../chart
    namespace: mariadb-1
    createNamespace: true
    kubeContext: kind-cluster-a
    values:
      - mariadb:
          enabled: true
          namespace: mariadb-1

  # cluster-b: MinIO for backup tests
  - name: minio
    chart: ../chart
    namespace: minio
    createNamespace: true
    kubeContext: kind-cluster-b
    values:
      - minio:
          enabled: true
        gateway:
          enabled: true
          virtualServices:
            - name: minio
              host: "minio.kind-b.test"
              backendHost: minio.minio.svc.cluster.local
              backendPort: 9000

  # cluster-a: fedauth, aqsh-mariadb, redis, rbac, gateway
  - name: mariadb-server
    chart: ../chart
    namespace: db-ops
    createNamespace: true
    kubeContext: kind-cluster-a
    needs:
      - kind-cluster-a/mariadb-1/mariadb-1
    values:
      - federatedAuth:
          enabled: true
          authorizedClients:
            - "cluster-a/db-ops/kube-auth-proxy"
        redis:
          enabled: true
        aqsh:
          enabled: true
          tasksConfig: /etc/aqsh/task-mariadb.yaml
          workerQueues: mariadb
          config:
            mariadb.env: |
              MINIO_ENDPOINT=http://minio.kind-b.test:30080
          authProxy:
            tokenReviewURL: "http://fedauth.kind-a.test:30080"
        mariadbRbac:
          enabled: true
        gateway:
          enabled: true
          virtualServices:
            - name: fedauth-mariadb
              host: "fedauth.kind-a.test"
              backendHost: kube-federated-auth.db-ops.svc.cluster.local
              backendPort: 8080
            - name: aqsh-mariadb
              host: "aqsh-mariadb.kind-a.test"
              backendHost: aqsh.db-ops.svc.cluster.local
              backendPort: 4180
