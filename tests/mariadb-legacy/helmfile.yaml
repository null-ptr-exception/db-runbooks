releases:
  - name: mariadb-rbac-a
    chart: ../chart
    namespace: db-ops
    createNamespace: true
    kubeContext: kind-cluster-a
    values:
      - federatedAuthReader:
          enabled: true

  - name: mariadb-client
    chart: ../chart
    namespace: db-ops
    createNamespace: true
    kubeContext: kind-cluster-b
    values:
      - federatedAuthReader:
          enabled: true
        testClient:
          enabled: true

  - name: mariadb-1
    chart: ../chart
    namespace: mariadb-1
    createNamespace: true
    kubeContext: kind-cluster-a
    values:
      - mariadb:
          enabled: true
          namespace: mariadb-1
          operatorGroup: mariadb.mmontes.io
          replicas: 1

  - name: minio
    chart: ../chart
    namespace: minio
    createNamespace: true
    kubeContext: kind-cluster-b
    values:
      - minio:
          enabled: true
        gateway:
          enabled: true
          virtualServices:
            - name: minio
              host: "minio.kind-b.test"
              backendHost: minio.minio.svc.cluster.local
              backendPort: 9000

  - name: mariadb-server
    chart: ../chart
    namespace: db-ops
    createNamespace: true
    kubeContext: kind-cluster-a
    needs:
      - kind-cluster-a/mariadb-1/mariadb-1
    values:
      - federatedAuth:
          enabled: true
          authorizedClients:
            - "cluster-a/db-ops/kube-auth-proxy"
            - "cluster-b/db-ops/kube-auth-proxy"
        redis:
          enabled: true
        aqsh:
          enabled: true
          tasksConfig: /etc/aqsh/task-mariadb.yaml
          workerQueues: mariadb
          config:
            mariadb.env: |
              MINIO_ENDPOINT=http://minio.kind-b.test:30080
          authProxy:
            tokenReviewURL: http://fedauth-mariadb.kind-a.test:30080
        mariadbRbac:
          enabled: true
        mariadb:
          operatorGroup: mariadb.mmontes.io
        gateway:
          enabled: true
          virtualServices:
            - name: fedauth-mariadb
              host: fedauth-mariadb.kind-a.test
              backendHost: kube-federated-auth.db-ops.svc.cluster.local
              backendPort: 8080
            - name: aqsh-mariadb
              host: aqsh-mariadb.kind-a.test
              backendHost: aqsh.db-ops.svc.cluster.local
              backendPort: 4180
