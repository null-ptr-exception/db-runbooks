name: CI

'on':
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install prerequisites
        run: ./scripts/preflight.sh

      - name: Run ShellCheck
        run: |
          find . -type f -name '*.sh' -print0 \
            | xargs -0 --no-run-if-empty shellcheck --severity=warning -x

      - name: Run Bats unit tests
        run: |
          if [ -d tests/unit ]; then
            bats --recursive tests/unit
          fi

      - name: Run Hadolint
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: aqsh-tasks/Dockerfile
          ignore: DL3008,DL4006

  build-image:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build aqsh-mariadb image
        run: docker build --build-arg TASKS_YAML=tasks-mariadb.yaml -t aqsh-mariadb:ci ./aqsh-tasks

      - name: Build aqsh-mongodb image
        run: docker build --build-arg TASKS_YAML=tasks-mongodb.yaml -t aqsh-mongodb:ci ./aqsh-tasks

  integration:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - db_mode: single
            use_mariadb_operator: "true"
          - db_mode: single
            use_mariadb_operator: "false"
          - db_mode: dual
            use_mariadb_operator: "true"
          - db_mode: dual
            use_mariadb_operator: "false"
    env:
      DB_MODE: ${{ matrix.db_mode }}
      USE_MARIADB_OPERATOR: ${{ matrix.use_mariadb_operator }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Tune kernel limits for Kind
        run: |
          sudo sysctl fs.inotify.max_user_watches=524288
          sudo sysctl fs.inotify.max_user_instances=512

      - name: Run BATS tests (DB_MODE=${{ matrix.db_mode }}, USE_MARIADB_OPERATOR=${{ matrix.use_mariadb_operator }})
        run: ./scripts/test.sh

      - name: Tear down clusters
        if: always()
        run: ./scripts/teardown.sh

  infra:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Tune kernel limits for Kind
        run: |
          sudo sysctl fs.inotify.max_user_watches=524288
          sudo sysctl fs.inotify.max_user_instances=512

      - name: Install prerequisites
        run: ./scripts/preflight.sh

      - name: Run infra e2e tests
        run: bats tests/infra/

      - name: Tear down infra clusters
        if: always()
        run: |
          kind delete cluster --name cluster-a 2>/dev/null || true
          kind delete cluster --name cluster-b 2>/dev/null || true
          docker rm -f registry 2>/dev/null || true
