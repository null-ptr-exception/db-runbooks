{{- if .Values.aqsh.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-auth-proxy
  namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aqsh
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aqsh
  template:
    metadata:
      labels:
        app: aqsh
    spec:
      serviceAccountName: kube-auth-proxy
      initContainers:
        - name: wait-redis
          image: redis:alpine
          command:
            - sh
            - -c
            - until redis-cli -h redis -p 6379 ping | grep -q PONG; do sleep 1; done
      {{- if or .Values.aqsh.config .Values.aqsh.pgpKey }}
      volumes:
        {{- if .Values.aqsh.config }}
        - name: aqsh-config
          configMap:
            name: aqsh-config
        {{- end }}
        {{- if .Values.aqsh.pgpKey }}
        - name: aqsh-pgp
          secret:
            secretName: aqsh-pgp
            defaultMode: 0400
        {{- end }}
      {{- end }}
      containers:
        - name: aqsh
          image: {{ .Values.aqsh.image }}
          imagePullPolicy: {{ .Values.aqsh.imagePullPolicy }}
          env:
            - name: AQSH_MODE
              value: both
            - name: AQSH_BIND
              value: "0.0.0.0:8080"
            - name: AQSH_REDIS_ADDR
              value: "redis:6379"
            - name: AQSH_TASKS_CONFIG
              value: {{ .Values.aqsh.tasksConfig }}
            - name: AQSH_TASKS_DIR
              value: /tasks
            - name: AQSH_REQUIRE_IDENTITY
              value: "true"
            - name: AQSH_WORKER_QUEUES
              value: {{ .Values.aqsh.workerQueues }}
          {{- if or .Values.aqsh.config .Values.aqsh.pgpKey }}
          volumeMounts:
            {{- if .Values.aqsh.config }}
            - name: aqsh-config
              mountPath: /etc/aqsh/config
              readOnly: true
            {{- end }}
            {{- if .Values.aqsh.pgpKey }}
            - name: aqsh-pgp
              mountPath: /etc/aqsh/pgp
              readOnly: true
            {{- end }}
          {{- end }}
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
        - name: kube-auth-proxy
          image: {{ .Values.aqsh.authProxy.image }}
          imagePullPolicy: {{ .Values.aqsh.authProxy.imagePullPolicy }}
          env:
            - name: UPSTREAM
              value: "http://localhost:8080"
            - name: TOKEN_REVIEW_URL
              value: {{ .Values.aqsh.authProxy.tokenReviewURL | quote }}
            - name: PORT
              value: "4180"
          ports:
            - containerPort: 4180
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
{{- if .Values.aqsh.config }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aqsh-config
  namespace: {{ .Release.Namespace }}
data:
  {{- range $filename, $content := .Values.aqsh.config }}
  {{ $filename }}: |
    {{ $content | nindent 4 }}
  {{- end }}
{{- end }}
{{- if .Values.aqsh.pgpKey }}
---
# Deployment PGP private key for the secrets/* task family (mounted at
# /etc/aqsh/pgp/private.asc — see SECRETS_PGP_KEY_PATH_DEFAULT). The suites
# generate a throwaway keypair in setup_suite.bash and inject it via
# runtime-values.yaml; a real deployment provisions this Secret out-of-band.
apiVersion: v1
kind: Secret
metadata:
  name: aqsh-pgp
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  private.asc: |
    {{ .Values.aqsh.pgpKey | nindent 4 }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: aqsh
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: aqsh
  ports:
    - port: 4180
      targetPort: 4180
{{- end }}
