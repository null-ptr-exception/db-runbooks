releases:
  # cluster-a: fedauth reader RBAC (needed for token creation)
  - name: aqsh-rbac-a
    chart: ../chart
    namespace: aqsh-test
    createNamespace: true
    kubeContext: kind-cluster-a
    values:
      - federatedAuthReader:
          enabled: true

  # cluster-b: fedauth reader RBAC + test-client
  - name: aqsh-client
    chart: ../chart
    namespace: aqsh-test
    createNamespace: true
    kubeContext: kind-cluster-b
    values:
      - federatedAuthReader:
          enabled: true
        testClient:
          enabled: true

  # cluster-a: fedauth, aqsh, redis, gateway
  # Runtime-discovered values (issuers, CAs, tokens) are injected via
  # a second helmfile apply with --values runtime-values.yaml.
  - name: aqsh-server
    chart: ../chart
    namespace: aqsh-test
    createNamespace: true
    kubeContext: kind-cluster-a
    values:
      - federatedAuth:
          enabled: true
          authorizedClients:
            - "cluster-a/aqsh-test/kube-auth-proxy"
        redis:
          enabled: true
        aqsh:
          enabled: true
          authProxy:
            tokenReviewURL: "http://fedauth.kind-a.test:30080"
        gateway:
          enabled: true
          virtualServices:
            - name: fedauth-aqsh
              host: "fedauth.kind-a.test"
              backendHost: kube-federated-auth.aqsh-test.svc.cluster.local
              backendPort: 8080
            - name: aqsh
              host: "aqsh.kind-a.test"
              backendHost: aqsh.aqsh-test.svc.cluster.local
              backendPort: 4180
