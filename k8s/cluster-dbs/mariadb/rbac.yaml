apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aqsh-mariadb-manager
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    resourceNames: ["mariadb"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  # Bound into each database namespace. create-account.sh also validates the
  # password Secret name prefix before reading or creating account Secrets.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
  - apiGroups: ["k8s.mariadb.com", "mariadb.mmontes.io"]
    resources: ["mariadbs"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: ["k8s.mariadb.com", "mariadb.mmontes.io"]
    resources: ["externalmariadbs", "physicalbackups"]
    verbs: ["get", "list", "watch", "create", "patch"]
