# Task definitions for the MongoDB runbook image.
#
# Pulled in via `include:` from `task-mongodb.yaml`, which owns the global
# `defaults:` (timeout / max_retry / queue). An included file MUST NOT define
# its own `defaults:` — aqsh rejects the whole config if it does.
tasks:
  common/hello:
    script: common/hello.sh
    timeout: 1m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: name
        env: NAME
        required: true
        type: string
  restart:
    script: mongodb/restart.sh
    description: "Rolling restart of a MongoDB StatefulSet"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
  sanity-check:
    script: mongodb/sanity-check.sh
    description: "3-layer health check: K8s infrastructure, MongoDB connectivity, MongoDB internals"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
  backup:
    script: backup/backup-mongodb.sh
    description: "DEPRECATED — legacy mongodump snapshot to MinIO (fixed pod/secret names, no PITR); prefer the pbm/* task family (docs/mongodb/pbm.md)"
    timeout: 15m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: minio_bucket
        env: MINIO_BUCKET
        required: false
        type: string
        default: db-backups
  create-account:
    script: mongodb/account/create-account.sh
    description: "Create or recreate a run MongoDB account"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        default: mongo-1
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: auth_db
        env: ACCOUNT_AUTH_DB
        required: false
        type: string
        default: admin
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: roles_json
        env: ACCOUNT_ROLES_JSON
        required: false
        type: string
        default: ""
      - name: database
        env: ACCOUNT_DATABASE
        required: false
        type: string
        default: admin
      - name: validity_days
        env: VALIDITY_DAYS
        required: false
        type: string
        default: "14"
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: allow_existing
        env: ALLOW_EXISTING
        required: false
        type: string
        default: "false"
      - name: password_length
        env: PASSWORD_LENGTH
        required: false
        type: string
        default: "24"
      - name: password_special_chars
        env: PASSWORD_SPECIAL_CHARS
        required: false
        type: string
        default: "!@#%^*_-+=."
      - name: password_special_max
        env: PASSWORD_SPECIAL_MAX
        required: false
        type: string
        default: "4"
      - name: password_delivery_mode
        env: PASSWORD_DELIVERY_MODE
        required: false
        type: string
        default: one_time_plaintext
      - name: recipient_pgp_pubkey
        env: RECIPIENT_PGP_PUBKEY
        required: false
        type: string
        default: ""
      - name: request_id
        env: REQUEST_ID
        required: false
        type: string
        default: ""
      - name: requested_by
        env: REQUESTED_BY
        required: false
        type: string
        default: ""
  delete-account:
    script: mongodb/account/delete-account.sh
    description: "Delete an existing MongoDB account"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        default: mongo-1
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: auth_db
        env: ACCOUNT_AUTH_DB
        required: false
        type: string
        default: admin
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: delete_reason
        env: DELETE_REASON
        required: false
        type: string
        default: MANUAL_DELETE
  ban-account:
    script: mongodb/account/ban-account.sh
    description: "Ban an account by removing all roles"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        default: mongo-1
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: auth_db
        env: ACCOUNT_AUTH_DB
        required: false
        type: string
        default: admin
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: ban_reason
        env: BAN_REASON
        required: false
        type: string
        default: SECURITY_POLICY
  extend-expiry:
    script: mongodb/account/extend-expiry.sh
    description: "Extend run account expiry"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        default: mongo-1
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: auth_db
        env: ACCOUNT_AUTH_DB
        required: false
        type: string
        default: admin
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: extend_days
        env: EXTEND_DAYS
        required: true
        type: string
      - name: allow_terminal_override
        env: ALLOW_TERMINAL_OVERRIDE
        required: false
        type: string
        default: "false"
  update-account-roles:
    script: mongodb/account/update-account-roles.sh
    description: "Update account role to database bindings"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        default: mongo-1
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: auth_db
        env: ACCOUNT_AUTH_DB
        required: false
        type: string
        default: admin
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: roles_json
        env: ACCOUNT_ROLES_JSON
        required: true
        type: string
  force-permanent:
    script: mongodb/account/force-permanent.sh
    description: "Force a run account into permanent state"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        default: mongo-1
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: auth_db
        env: ACCOUNT_AUTH_DB
        required: false
        type: string
        default: admin
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: forced_by
        env: FORCED_BY
        required: false
        type: string
        default: unknown
      - name: force_reason
        env: FORCE_REASON
        required: false
        type: string
        default: MANUAL_FORCE_PERMANENT
  reset-password:
    script: mongodb/account/reset-password.sh
    description: "Reset account password and optionally restart run lifecycle"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        default: mongo-1
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: auth_db
        env: ACCOUNT_AUTH_DB
        required: false
        type: string
        default: admin
      - name: username
        env: ACCOUNT_USERNAME
        required: true
        type: string
      - name: validity_days
        env: VALIDITY_DAYS
        required: false
        type: string
        default: "14"
      - name: reset_override
        env: RESET_OVERRIDE
        required: false
        type: string
        default: "false"
      - name: password_length
        env: PASSWORD_LENGTH
        required: false
        type: string
        default: "24"
      - name: password_special_chars
        env: PASSWORD_SPECIAL_CHARS
        required: false
        type: string
        default: "!@#%^*_-+=."
      - name: password_special_max
        env: PASSWORD_SPECIAL_MAX
        required: false
        type: string
        default: "4"
      - name: password_delivery_mode
        env: PASSWORD_DELIVERY_MODE
        required: false
        type: string
        default: one_time_plaintext
      - name: recipient_pgp_pubkey
        env: RECIPIENT_PGP_PUBKEY
        required: false
        type: string
        default: ""
  reconcile-expiry:
    script: mongodb/account/reconcile-expiry.sh
    description: "Reconcile expired run accounts"
    timeout: 15m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
        default: mongo-1
      - name: sts_name
        env: MONGO_STS_NAME
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: credential_secret
        env: MONGO_CRED_SECRET
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_user_key
        env: MONGO_CRED_USER_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
      - name: credential_pass_key
        env: MONGO_CRED_PASS_KEY
        required: false
        type: string
        default: ""  # deployment convention; see CLAUDE.md "Configuration Layers"
  recovery/pre-check:
    script: mongodb/recovery/pre-check.sh
    description: "Run G1-G8 pre-flight gates for a target pod (read-only)"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: target_pod
        env: RECOVERY_TARGET_POD
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: force_wipe
        env: FORCE_WIPE
        required: false
        type: string
        default: "false"
  recovery/wipe:
    script: mongodb/recovery/wipe.sh
    description: "Wipe corrupted pod data and trigger initial sync (runs G1-G8 gates first)"
    timeout: 10m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: target_pod
        env: RECOVERY_TARGET_POD
        required: false
        type: string
        default: ""
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: force_wipe
        env: FORCE_WIPE
        required: false
        type: string
        default: "false"
  recovery/reset:
    script: mongodb/recovery/reset.sh
    description: "Clear wipe-target and restore StatefulSet partition to locked state"
    timeout: 3m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
  recovery/status:
    script: mongodb/recovery/status.sh
    description: "Show current recovery state (wipe-target, partition, pod phases)"
    timeout: 2m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
  recovery/fix-no-primary:
    script: mongodb/recovery/fix-no-primary.sh
    description: "Restore primary when all RS members show SECONDARY (E1+E5 combined scenario)"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: level
        env: RECOVERY_LEVEL
        required: true
        type: string
        pattern: '^(diagnose|unfreeze|reconfig|force-primary)$'
      - name: force_primary_pod
        env: RECOVERY_FORCE_POD
        required: false
        type: string
        default: ""
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
  # Reconfig gateway (see docs/mongodb/reconfig.md). Deployment-naming fields
  # (sts_name, credential_*) are deliberately NOT task inputs — same
  # auto-detect tier as recovery/* (CLAUDE.md "Configuration Layers").
  reconfig/plan:
    script: mongodb/reconfig/plan.sh
    description: "Read-only risk report for a proposed RS reconfig (returns plan_hash)"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: ops_json
        env: RECONFIG_OPS_JSON
        required: true
        type: string
  reconfig/apply:
    script: mongodb/reconfig/apply.sh
    description: "Execute a planned RS reconfig (CAS on plan_hash; one reconfig step per op)"
    timeout: 10m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: ops_json
        env: RECONFIG_OPS_JSON
        required: true
        type: string
      - name: plan_hash
        env: RECONFIG_PLAN_HASH
        required: true
        type: string
        pattern: '^rcp[0-9a-f]{24}$'
      - name: override_reason
        env: OVERRIDE_REASON
        required: false
        type: string
        default: ""
      - name: requested_by
        env: REQUESTED_BY
        required: false
        type: string
        default: ""
      - name: request_id
        env: REQUEST_ID
        required: false
        type: string
        default: ""
  reconfig/force-dr:
    script: mongodb/reconfig/force-dr.sh
    description: "Break-glass forced reconfig for site-loss DR (dry_run -> confirm)"
    timeout: 10m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: incident_id
        env: INCIDENT_ID
        required: true
        type: string
        pattern: '^[A-Za-z0-9._-]+$'
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: plan_hash
        env: RECONFIG_PLAN_HASH
        required: false
        type: string
        default: ""
        pattern: '^(rcp[0-9a-f]{24})?$'
      - name: requested_by
        env: REQUESTED_BY
        required: false
        type: string
        default: ""
  reconfig/freeze:
    script: mongodb/reconfig/freeze.sh
    description: "Toggle the change-freeze annotation (blocks reconfig/apply, never force-dr)"
    timeout: 3m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: enabled
        env: FREEZE_ENABLED
        required: true
        type: string
        pattern: '^(true|false)$'
      - name: reason
        env: FREEZE_REASON
        required: false
        type: string
        default: ""
  recovery/recover:
    script: mongodb/recovery/recover.sh
    description: "One-call orchestrated recovery: gates -> wipe -> wait -> reset"
    timeout: 12m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: target_pod
        env: RECOVERY_TARGET_POD
        required: false
        type: string
        default: ""
        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?)?$'
      - name: force_wipe
        env: FORCE_WIPE
        required: false
        type: string
        default: "false"
      - name: wait_timeout
        env: RECOVERY_WAIT_TIMEOUT
        required: false
        type: string
        default: "300"
  # FCV gateway (see docs/mongodb/fcv.md). Deployment-naming fields
  # (sts_name, credential_*) are deliberately NOT task inputs — same
  # auto-detect tier as recovery/* (CLAUDE.md "Configuration Layers").
  fcv/status:
    script: mongodb/fcv/status.sh
    description: "Read-only: server version, current FCV, transitional state, allowed FCV targets"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
  fcv/set:
    script: mongodb/fcv/set.sh
    description: "Set featureCompatibilityVersion on the primary, validated against the binary version (dry_run -> confirm)"
    timeout: 10m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: target_version
        env: FCV_TARGET_VERSION
        required: true
        type: string
        pattern: '^[0-9]+\.[0-9]+$'
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
  # PBM gateway — Percona Backup for MongoDB: logical/physical/incremental
  # backups + PITR; physical restore runs a full-downtime StatefulSet
  # takeover (see docs/mongodb/pbm.md). Deployment-naming fields (sts_name, agent
  # container, storage location, S3 credentials) are deliberately NOT task
  # inputs — same auto-detect tier as recovery/* (CLAUDE.md "Configuration
  # Layers"). log_level IS a task input: per-call debug verbosity is a
  # genuinely per-call decision.
  pbm/status:
    script: mongodb/pbm/status.sh
    description: "Read-only: PBM agent health, storage config (+in-sync check), PITR state and covered ranges, running op, snapshot summary"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: log_level
        env: LOG_LEVEL
        required: false
        type: string
        default: ""
        pattern: '^(DEBUG|INFO|WARN|ERROR)?$'
  pbm/backup:
    script: mongodb/pbm/backup.sh
    description: "Start a PBM backup (logical | physical | incremental — the latter two need PSMDB + a data-volume-sharing agent, live-checked) and wait for completion; storage auto-ensured on first use"
    timeout: 25m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: type
        env: PBM_BACKUP_TYPE
        required: false
        type: string
        default: "logical"
        # non-logical values pass the pattern on purpose so the script can
        # reject them with UNSUPPORTED_BACKUP_TYPE + the reason, instead of
        # an opaque input-validation 400.
        pattern: '^(logical|physical|incremental|external)?$'
      - name: ns
        env: PBM_NS_FILTER
        required: false
        type: string
        default: ""
        pattern: '^([A-Za-z0-9_*.-]+(,[A-Za-z0-9_*.-]+)*)?$'
      - name: wait
        env: PBM_WAIT
        required: false
        type: string
        default: "true"
      - name: wait_timeout
        env: PBM_WAIT_TIMEOUT
        required: false
        type: string
        default: "1200"
        pattern: '^([0-9]{1,5})?$'
      - name: log_level
        env: LOG_LEVEL
        required: false
        type: string
        default: ""
        pattern: '^(DEBUG|INFO|WARN|ERROR)?$'
  pbm/list:
    script: mongodb/pbm/list.sh
    description: "Read-only: backup inventory + PITR ranges; with name=<backup>, full describe-backup detail"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: name
        env: PBM_BACKUP_NAME
        required: false
        type: string
        default: ""
        pattern: '^([0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z)?$'
      - name: include_restores
        env: PBM_INCLUDE_RESTORES
        required: false
        type: string
        default: "false"
      - name: log_level
        env: LOG_LEVEL
        required: false
        type: string
        default: ""
        pattern: '^(DEBUG|INFO|WARN|ERROR)?$'
  pbm/restore:
    script: mongodb/pbm/restore.sh
    description: "Restore from a snapshot (backup_name) or to a point in time (time), dry_run -> confirm; logical runs online, physical/incremental take the FULL CLUSTER OFFLINE via a StatefulSet takeover; PITR is disabled for the restore and stays off until a fresh base backup"
    timeout: 45m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: backup_name
        env: PBM_BACKUP_NAME
        required: false
        type: string
        default: ""
        pattern: '^([0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z)?$'
      - name: time
        env: PBM_RESTORE_TIME
        required: false
        type: string
        default: ""
        pattern: '^([0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2})?$'
      - name: ns
        env: PBM_NS_FILTER
        required: false
        type: string
        default: ""
        pattern: '^([A-Za-z0-9_*.-]+(,[A-Za-z0-9_*.-]+)*)?$'
      - name: wait_timeout
        env: PBM_WAIT_TIMEOUT
        required: false
        type: string
        default: "1500"
        pattern: '^([0-9]{1,5})?$'
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: log_level
        env: LOG_LEVEL
        required: false
        type: string
        default: ""
        pattern: '^(DEBUG|INFO|WARN|ERROR)?$'
  pbm/delete:
    script: mongodb/pbm/delete.sh
    description: "Remove backup artifacts, dry_run -> confirm: single snapshot (backup_name) or retention sweep (older_than = Nd or timestamp)"
    timeout: 10m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: backup_name
        env: PBM_BACKUP_NAME
        required: false
        type: string
        default: ""
        pattern: '^([0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z)?$'
      - name: older_than
        env: PBM_OLDER_THAN
        required: false
        type: string
        default: ""
        pattern: '^([0-9]+d|[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2})?$'
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: log_level
        env: LOG_LEVEL
        required: false
        type: string
        default: ""
        pattern: '^(DEBUG|INFO|WARN|ERROR)?$'
  pbm/pitr:
    script: mongodb/pbm/pitr.sh
    description: "Enable/disable PITR oplog slicing (dry_run -> confirm); enable requires a done base backup; oplog_span_min tunes the RPO granularity"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: enabled
        env: PBM_PITR_ENABLED
        required: true
        type: string
        pattern: '^(true|false)$'
      - name: oplog_span_min
        env: PBM_OPLOG_SPAN_MIN
        required: false
        type: string
        default: ""
        pattern: '^([0-9]+(\.[0-9]+)?)?$'
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: log_level
        env: LOG_LEVEL
        required: false
        type: string
        default: ""
        pattern: '^(DEBUG|INFO|WARN|ERROR)?$'
  pbm/logs:
    script: mongodb/pbm/logs.sh
    description: "Read-only: PBM agent log stream — filter by event (e.g. backup/<name>) and severity to diagnose failed operations"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: event
        env: PBM_LOG_EVENT
        required: false
        type: string
        default: ""
        pattern: '^([A-Za-z0-9/:._-]+)?$'
      - name: severity
        env: PBM_LOG_SEVERITY
        required: false
        type: string
        default: ""
        pattern: '^(D|I|W|E|F)?$'
      - name: tail
        env: PBM_LOG_TAIL
        required: false
        type: string
        default: "50"
        pattern: '^[0-9]{1,4}$'
      - name: log_level
        env: LOG_LEVEL
        required: false
        type: string
        default: ""
        pattern: '^(DEBUG|INFO|WARN|ERROR)?$'
  pbm/cancel-backup:
    script: mongodb/pbm/cancel-backup.sh
    description: "Abort the currently running backup (dry_run -> confirm); dry-run shows the op that would be aborted"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: log_level
        env: LOG_LEVEL
        required: false
        type: string
        default: ""
        pattern: '^(DEBUG|INFO|WARN|ERROR)?$'
  pbm/schedule:
    script: mongodb/pbm/schedule.sh
    description: "Manage the recurring-backup schedule (dry_run -> confirm): PBM has no built-in scheduler, so aqsh owns one CronJob per namespace that submits pbm/backup on the given cron expression; enabled toggles suspend, remove deletes it"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: schedule
        env: PBM_SCHEDULE_CRON
        required: false
        type: string
        default: ""
        # five whitespace-separated cron fields (digits and * , - /)
        pattern: '^([0-9*,/-]+[ ]+[0-9*,/-]+[ ]+[0-9*,/-]+[ ]+[0-9*,/-]+[ ]+[0-9*,/-]+)?$'
      - name: type
        env: PBM_SCHEDULE_TYPE
        required: false
        type: string
        default: ""
        pattern: '^(logical|physical|incremental)?$'
      - name: enabled
        env: PBM_SCHEDULE_ENABLED
        required: false
        type: string
        default: ""
        pattern: '^(true|false)?$'
      - name: remove
        env: PBM_SCHEDULE_REMOVE
        required: false
        type: string
        default: "false"
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: log_level
        env: LOG_LEVEL
        required: false
        type: string
        default: ""
        pattern: '^(DEBUG|INFO|WARN|ERROR)?$'
  pbm/config:
    script: mongodb/pbm/config.sh
    description: "Storage config gateway (dry_run -> confirm): diff current PBM storage vs the deployment-resolved location; confirm applies it + force-resync (the sanctioned path for endpoint/bucket migrations)"
    timeout: 10m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: dry_run
        env: DRY_RUN
        required: false
        type: string
        default: "true"
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: log_level
        env: LOG_LEVEL
        required: false
        type: string
        default: ""
        pattern: '^(DEBUG|INFO|WARN|ERROR)?$'
  # Secrets gateway — safe CRUD for K8s Secrets in the DB namespace (see
  # docs/mongodb/secrets.md). Values arrive PGP-encrypted against the
  # deployment key (secrets/pubkey); plaintext never crosses the gateway.
  # Upsert is plan -> apply with a stateless CAS plan_hash (reconfig model);
  # delete is confirm-gated. The PGP key path and the protected-secret list
  # are deliberately NOT task inputs — internal config + live auto-detect
  # only (CLAUDE.md "Configuration Layers").
  secrets/pubkey:
    script: secrets/pubkey.sh
    description: "Return the deployment PGP public key callers encrypt secrets payloads against"
    timeout: 1m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: log_level
        env: LOG_LEVEL
        required: false
        type: string
        default: ""
        pattern: '^(DEBUG|INFO|WARN|ERROR)?$'
  secrets/get:
    script: secrets/get.sh
    description: "Describe a Secret: key names + value sha256 fingerprints (values never returned)"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: secret_name
        env: SECRET_NAME
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
      - name: log_level
        env: LOG_LEVEL
        required: false
        type: string
        default: ""
        pattern: '^(DEBUG|INFO|WARN|ERROR)?$'
  secrets/plan:
    script: secrets/plan.sh
    description: "Read-only upsert preview for a PGP-encrypted secret payload (returns plan_hash)"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: secret_name
        env: SECRET_NAME
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
      - name: payload
        env: SECRETS_PAYLOAD
        required: true
        type: string
      - name: mode
        env: SECRETS_MODE
        required: false
        type: string
        default: ""
        pattern: '^(upsert|add_only)?$'
      - name: log_level
        env: LOG_LEVEL
        required: false
        type: string
        default: ""
        pattern: '^(DEBUG|INFO|WARN|ERROR)?$'
  secrets/apply:
    script: secrets/apply.sh
    description: "Execute a planned secret upsert (CAS on plan_hash; merge-only, values stdin-only)"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: secret_name
        env: SECRET_NAME
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
      - name: payload
        env: SECRETS_PAYLOAD
        required: true
        type: string
      - name: mode
        env: SECRETS_MODE
        required: false
        type: string
        default: ""
        pattern: '^(upsert|add_only)?$'
      - name: plan_hash
        env: SECRETS_PLAN_HASH
        required: true
        type: string
        pattern: '^sec[0-9a-f]{24}$'
      - name: requested_by
        env: REQUESTED_BY
        required: false
        type: string
        default: ""
      - name: request_id
        env: REQUEST_ID
        required: false
        type: string
        default: ""
      - name: log_level
        env: LOG_LEVEL
        required: false
        type: string
        default: ""
        pattern: '^(DEBUG|INFO|WARN|ERROR)?$'
  secrets/delete:
    script: secrets/delete.sh
    description: "Delete a Secret (confirm=false previews key names/fingerprints; confirm=true deletes)"
    timeout: 5m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
      - name: secret_name
        env: SECRET_NAME
        required: true
        type: string
        pattern: '^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$'
      - name: confirm
        env: CONFIRM
        required: false
        type: string
        default: "false"
      - name: log_level
        env: LOG_LEVEL
        required: false
        type: string
        default: ""
        pattern: '^(DEBUG|INFO|WARN|ERROR)?$'
