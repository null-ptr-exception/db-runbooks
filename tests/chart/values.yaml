# Default values — installs nothing. Each suite's helmfile.yaml enables
# the components it needs via inline values.

# --- kube-federated-auth ---
federatedAuth:
  enabled: false
  image: ghcr.io/rophy/kube-federated-auth:3.2.0
  imagePullPolicy: IfNotPresent
  # clusters config is passed at install time (runtime-discovered)
  clusters: {}
  # CA certs and tokens are passed at install time
  caCerts: {}
  tokens: {}

# --- kube-federated-auth-reader RBAC (needed on each cluster) ---
federatedAuthReader:
  enabled: false

# --- redis ---
redis:
  enabled: false

# --- aqsh (with kube-auth-proxy sidecar) ---
aqsh:
  enabled: false
  image: localhost:5005/db-runbooks:latest
  imagePullPolicy: IfNotPresent
  tasksConfig: /etc/aqsh/task-mariadb.yaml
  workerQueues: mariadb
  config: {}
  # PGP private key for the secrets/* task family — exactly one of:
  #   pgpKey:        ASCII-armored key content; the chart renders it into
  #                  Secret aqsh-pgp (test suites inject a per-run throwaway
  #                  key via runtime-values.yaml — see tests/*/setup_suite.bash)
  #   pgpSecretName: name of a pre-created Secret (key `private.asc`),
  #                  provisioned out-of-band — the production path, key
  #                  material never transits helm values/release storage
  # Both empty = no mount; secrets/plan|apply|pubkey fail PGP_KEY_UNAVAILABLE.
  pgpKey: ""
  pgpSecretName: ""
  authProxy:
    image: ghcr.io/rophy/kube-auth-proxy:0.4.1
    imagePullPolicy: IfNotPresent
    tokenReviewURL: ""

# --- mariadb (operator-managed) ---
mariadb:
  enabled: false
  namespace: mariadb-1
  # CRD apiGroup of the mariadb-operator generation this deployment runs:
  # k8s.mariadb.com (current) or a legacy mariadb.*.mmontes.io fork. Drives both
  # the operand apiVersion and the RBAC apiGroups so a non-default fork is not
  # silently denied. Scripts detect this at runtime (see mariadb-operator-profile.sh);
  # this value keeps the chart-rendered objects in sync with that convention.
  operatorGroup: k8s.mariadb.com
  image: mariadb:10.6
  # replicas > 1 turns on operator replication (1 primary + N-1 replicas),
  # required by the switch-primary e2e. Default 1 = standalone.
  replicas: 1
  rootPassword: mariadb-test-pass
  objectStorage:
    enabled: false
    secretName: mariadb-object-storage
    endpoint: http://minio.kind-b.test:30080
    bucket: db-backups
    region: us-east-1
    prefix: ""
    accessKey: minioadmin
    secretKey: minioadmin-changeme-prod
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

# --- mariadb RBAC ---
mariadbRbac:
  enabled: false
  # Additional database namespaces served by the same AQSH deployment.
  namespaces: []

# --- namespace-local MariaDB gateway fixture ---
# The Envoy workload and Service are installed with the official Istio gateway
# chart in the MariaDB namespace. These values render the matching Gateway CR,
# TCP VirtualService, and an in-cluster client used by the E2E tests.
databaseGateway:
  enabled: false
  name: database-gateway
  hosts:
    - "*.db.test"
  ports:
    readWrite: 3306
    readOnly: 3307
  destinations:
    readWriteService: mariadb-primary
    readOnlyService: mariadb-secondary
    port: 3306
  testClient:
    enabled: false
    image: mariadb:10.6

# --- mongodb ---
mongodb:
  enabled: false
  namespace: mongo-1
  image: mongo:7.0.21
  storage: 1Gi
  # updateStrategy for the StatefulSet. Default RollingUpdate matches the
  # official mongo image's normal deployment convention (aqsh drives the
  # rollout directly). Set to OnDelete to model Bitnami-operator-style
  # deployments, where an external actor (operator or human) is expected to
  # delete pods to pick up the new template — see tests/mongodb/
  # restart_ondelete.bats for how k8s_sts_restart's OnDelete branch is
  # exercised against this.
  updateStrategy: RollingUpdate
  # Naming convention this deployment's recovery/account/sanity-check/
  # reconfig tasks use by default (see aqsh-tasks/config/mongodb.env's
  # *_DEFAULT keys and CLAUDE.md "Configuration Layers"). The RBAC
  # ClusterRole below is scoped to these names — change them together.
  stsName: mongodb
  credentialSecret: mongodb-credentials
  recoveryConfigmap: mongodb-recovery-config
  reconfigAuditConfigmap: mongodb-reconfig-audit
  # S3 credentials secret the pbm/* tasks read in the DB namespace (keys
  # access-key-id / secret-access-key — same shape the MariaDB operator flow
  # uses). Pairs with PBM_S3_CREDENTIALS_SECRET_DEFAULT in mongodb.env AND
  # with SECRETS_PROTECTED_NAMES_DEFAULT (the secrets/* family must refuse
  # to write it) — rename all three together.
  backupSecret: minio
  # The CronJob pbm/schedule manages in the DB namespace. Pairs with
  # PBM_SCHEDULE_CRONJOB_DEFAULT in mongodb.env.
  scheduleCronjob: pbm-backup-schedule

# --- mongodb RBAC ---
mongodbRbac:
  enabled: false

# --- test-client (curl pod with projected SA token) ---
testClient:
  enabled: false

# --- minio ---
minio:
  enabled: false
  image: minio/minio:latest
  rootUser: minioadmin
  rootPassword: minioadmin-changeme-prod

# --- nginx (simple HTTP target for connectivity tests) ---
nginx:
  enabled: false

# --- curl (sleep pod for connectivity tests) ---
curl:
  enabled: false

# --- Istio VirtualServices (route through shared-gateway) ---
gateway:
  enabled: false
  # Each entry: { name, host, backendHost, backendPort }
  virtualServices: []
