defaults:
  timeout: 5m
  max_retry: 0
  queue: mariadb
tasks:
  common/hello:
    script: common/hello.sh
    timeout: 1m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: name
        env: NAME
        required: true
        type: string
  restart:
    script: mariadb/restart.sh
    description: "Rolling restart of a MariaDB StatefulSet"
    timeout: 8m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^mariadb-[0-9]+$'
      - name: sts_name
        env: MARIADB_STS_NAME
        required: false
        type: string
        default: mariadb
      - name: pod_selector
        env: MARIADB_POD_SELECTOR
        required: false
        type: string
        default: app.kubernetes.io/name=mariadb
  backup:
    script: backup/backup-mariadb.sh
    description: "Backup MariaDB database to MinIO"
    timeout: 15m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^mariadb-[0-9]+$'
      - name: minio_bucket
        env: MINIO_BUCKET
        required: false
        type: string
        default: db-backups
      - name: backup_databases
        env: BACKUP_DATABASES
        required: false
        type: string
        default: --all-databases
  setup-replication:
    script: mariadb/setup-replication.sh
    description: "Configure GTID-based MariaDB replication from primary to replicas"
    timeout: 10m
    allowed_groups: ["system:serviceaccounts"]
    input:
      - name: namespace
        env: DB_NAMESPACE
        required: true
        type: string
        pattern: '^mariadb-[0-9]+$'
      - name: topology
        env: REPL_TOPOLOGY
        required: true
        type: string
        pattern: '^(2\+1|1\+2|3\+0)$'
      - name: cluster_a_ip
        env: CLUSTER_A_IP
        required: true
        type: string
      - name: cluster_b_ip
        env: CLUSTER_B_IP
        required: false
        type: string
        default: ""
      - name: credential_secret
        env: MARIADB_CRED_SECRET
        required: false
        type: string
        default: mariadb
