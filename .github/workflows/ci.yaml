name: CI

'on':
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_DB_RUNBOOKS: ghcr.io/${{ github.repository }}

jobs:
  lint:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install prerequisites
        run: ./scripts/preflight.sh

      - name: Run ShellCheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi
          find . -type f -name '*.sh' -print0 \
            | xargs -0 --no-run-if-empty shellcheck --severity=warning -x

      - name: Run Bats unit tests
        run: |
          if [ -d tests/unit ]; then
            bats --recursive tests/unit
          fi

      - name: Run Hadolint
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL4006

  build-image:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build db-runbooks task image
        run: docker build -t "${IMAGE_DB_RUNBOOKS}:ci" .

  mariadb:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Tune kernel limits for Kind
        run: |
          sudo sysctl fs.inotify.max_user_watches=524288
          sudo sysctl fs.inotify.max_user_instances=512

      - name: Run mariadb test suite
        run: bats tests/mariadb/

      - name: Tear down clusters
        if: always()
        run: |
          kind delete cluster --name cluster-a 2>/dev/null || true
          kind delete cluster --name cluster-b 2>/dev/null || true
          docker rm -f registry 2>/dev/null || true

  mariadb-legacy:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Tune kernel limits for Kind
        run: |
          sudo sysctl fs.inotify.max_user_watches=524288
          sudo sysctl fs.inotify.max_user_instances=512

      - name: Run legacy MariaDB operator e2e suite
        run: bats tests/mariadb-legacy/

      - name: Tear down legacy clusters
        if: always()
        run: |
          kind delete cluster --name cluster-a 2>/dev/null || true
          kind delete cluster --name cluster-b 2>/dev/null || true
          docker rm -f registry 2>/dev/null || true

  publish-image:
    needs: [lint, build-image, mariadb, mariadb-legacy, mongodb]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Generate image tag
        id: image-tag
        run: |
          short_sha="${GITHUB_SHA::7}"
          image_tag="$(date -u +%Y%m%d)-${short_sha}"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push db-runbooks task image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_DB_RUNBOOKS }}:${{ steps.image-tag.outputs.image_tag }}

  infra:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Tune kernel limits for Kind
        run: |
          sudo sysctl fs.inotify.max_user_watches=524288
          sudo sysctl fs.inotify.max_user_instances=512

      - name: Run infra e2e tests
        run: bats tests/infra/

      - name: Tear down infra clusters
        if: always()
        run: |
          kind delete cluster --name cluster-a 2>/dev/null || true
          kind delete cluster --name cluster-b 2>/dev/null || true
          docker rm -f registry 2>/dev/null || true

  aqsh:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Tune kernel limits for Kind
        run: |
          sudo sysctl fs.inotify.max_user_watches=524288
          sudo sysctl fs.inotify.max_user_instances=512

      - name: Run aqsh test suite
        run: bats tests/aqsh/

      - name: Tear down clusters
        if: always()
        run: |
          kind delete cluster --name cluster-a 2>/dev/null || true
          kind delete cluster --name cluster-b 2>/dev/null || true
          docker rm -f registry 2>/dev/null || true

  mongodb:
    runs-on: [self-hosted, aws-runner]
    timeout-minutes: 75
    strategy:
      fail-fast: false
      # Each shard pays the full ~15-20min setup_suite cost (build+push the
      # image, stand up both Kind clusters, Cilium+Istio, the mongo-core/
      # mongo-1 control plane) on top of its own tests — bats' setup_suite/
      # teardown_suite lifecycle is per-invocation, so splitting below the
      # file level would just multiply that fixed cost with no benefit.
      # Groups are sized ~30-50 tests each (161 total) and kept semantically
      # coherent so a shard failure name is itself informative. Add new
      # *.bats files to whichever shard they belong with — nothing here
      # auto-discovers new files.
      matrix:
        shard:
          - name: core
            files: >-
              tests/mongodb/secrets.bats
              tests/mongodb/account_lifecycle.bats
              tests/mongodb/mongodb.bats
              tests/mongodb/backup.bats
              tests/mongodb/sanity_degraded.bats
          - name: recovery
            files: >-
              tests/mongodb/recovery.bats
              tests/mongodb/recovery_autodetect.bats
              tests/mongodb/recovery_autodetect_bitnami_secret.bats
              tests/mongodb/recovery_autodetect_file_mount.bats
              tests/mongodb/recovery_auto_patch.bats
              tests/mongodb/recovery_auto_patch_fresh.bats
              tests/mongodb/recovery_auto_patch_fresh_bitnami.bats
              tests/mongodb/recovery_bitnami_profile.bats
              tests/mongodb/recovery_custom_naming.bats
              tests/mongodb/recovery_probe_skip.bats
          - name: pbm
            files: >-
              tests/mongodb/pbm.bats
              tests/mongodb/pbm_bitnami.bats
              tests/mongodb/pbm_physical.bats
              tests/mongodb/pbm_physical_bitnami.bats
              tests/mongodb/pbm_pitr.bats
          - name: reconfig
            files: >-
              tests/mongodb/reconfig.bats
              tests/mongodb/fcv.bats
              tests/mongodb/fcv_bitnami.bats
              tests/mongodb/restart_ondelete.bats
              tests/mongodb/restart_stuck_partition.bats
              tests/mongodb/sts_orphan_delete.bats
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Tune kernel limits for Kind
        run: |
          sudo sysctl fs.inotify.max_user_watches=524288
          sudo sysctl fs.inotify.max_user_instances=512

      - name: Clean slate — remove any leftover clusters from a prior run
        run: |
          # This runs on a persistent self-hosted runner, not ephemeral
          # GitHub-hosted infra. "Tear down clusters" below swallows its own
          # failures (`|| true`), so a run that gets killed/cancelled mid-way
          # can leave cluster-a/cluster-b/registry alive for the NEXT run to
          # silently reuse via ctlptl's idempotent apply — including
          # whatever stale Helm-deployed RBAC objects (ClusterRoles etc.)
          # that earlier run's checkout had, not this run's. Force a clean
          # slate unconditionally before creating anything.
          # cluster-a/cluster-b/registry are fixed names (infra/ctlptl-infra.yaml)
          # shared by every shard — this assumes one job runs at a time per
          # runner instance (the GitHub Actions default for self-hosted
          # runners). Two shards concurrently scheduled onto the SAME runner
          # would collide.
          kind delete cluster --name cluster-a 2>/dev/null || true
          kind delete cluster --name cluster-b 2>/dev/null || true
          docker rm -f registry 2>/dev/null || true

      - name: Run mongodb test suite (${{ matrix.shard.name }})
        run: bats ${{ matrix.shard.files }}

      - name: Dump aqsh logs and runner resource state on failure
        if: failure()
        run: |
          echo "::group::disk usage"
          df -h
          echo "::endgroup::"
          echo "::group::docker system df"
          docker system df -v
          echo "::endgroup::"
          echo "::group::aqsh-mongodb pod logs (captured by teardown_suite before namespace deletion)"
          cat /tmp/aqsh-mongodb-teardown.log
          echo "::endgroup::"
        continue-on-error: true

      - name: Tear down clusters
        if: always()
        run: |
          kind delete cluster --name cluster-a 2>/dev/null || true
          kind delete cluster --name cluster-b 2>/dev/null || true
          docker rm -f registry 2>/dev/null || true
