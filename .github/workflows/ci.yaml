name: CI

'on':
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck python3-pip bats
          python3 -m pip install yamllint

      - name: Run ShellCheck
        run: |
          find . -type f -name '*.sh' -print0 \
            | xargs -0 --no-run-if-empty shellcheck --severity=warning -x

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: aqsh-tasks/Dockerfile
          ignore: DL3008,DL4006

      - name: Run yamllint
        run: |
          find k8s -type f \( -name '*.yaml' -o -name '*.yml' -o -name '*.yaml.tpl' -o -name '*.yml.tpl' \) -print0 \
            | xargs -0 --no-run-if-empty yamllint -c .yamllint.yaml

  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build aqsh-mariadb image
        run: docker build --build-arg TASKS_YAML=tasks-mariadb.yaml -t aqsh-mariadb:ci ./aqsh-tasks

      - name: Build aqsh-mongodb image
        run: docker build --build-arg TASKS_YAML=tasks-mongodb.yaml -t aqsh-mongodb:ci ./aqsh-tasks

  integration:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install integration dependencies
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y gettext-base jq bats

          ARCH="$(dpkg --print-architecture)"
          KUBECTL_VERSION="v1.30.0"
          case "$ARCH" in
            amd64|arm64) ;;
            *)
              echo "Unsupported architecture: $ARCH" >&2
              exit 1
              ;;
          esac

          curl -fsSLo kind "https://kind.sigs.k8s.io/dl/latest/kind-linux-${ARCH}"
          chmod +x kind
          sudo mv kind /usr/local/bin/kind

          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${ARCH}/kubectl"
          curl -fsSLo kubectl.sha256 "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${ARCH}/kubectl.sha256"
          echo "$(cat kubectl.sha256)  kubectl" | sha256sum -c -
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          rm -f kubectl.sha256

          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

          curl -fsSLo skaffold "https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-${ARCH}"
          chmod +x skaffold
          sudo mv skaffold /usr/local/bin/skaffold

      - name: Run integration tests
        run: ./scripts/test.sh

      - name: Tear down clusters
        if: always()
        run: ./scripts/teardown.sh

