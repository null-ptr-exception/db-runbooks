{{- if .Values.federatedAuthReader.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-federated-auth-reader
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-federated-auth-reader-{{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-federated-auth-reader
subjects:
  - kind: ServiceAccount
    name: kube-federated-auth-reader
    namespace: {{ .Release.Namespace }}
{{- end }}
